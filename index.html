                                        cancelButtonColor: '#94a3b8',
                                        confirmButtonText: 'はい、提出します',
                                        cancelButtonText: 'キャンセル'
                                    });
                                    if (confirmResult.isConfirmed) onSave(true);
                                }} className="flex items-center justify-center gap-2 pt-4 pb-3 bg-gradient-to-r from-blue-500 to-blue-400 text-white rounded-xl font-bold hover:from-blue-600 hover:to-blue-500 transition-all active:scale-95 shadow-md hover:shadow-lg leading-loose"><i className="bi bi-send text-[18px]"></i> <span><Rb t="提出" r="ていしゅつ"/></span></button>
                            </>
                        )}
                    </div>
                </div>

                {/* 右パネル (プレビュー) */}
                <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative min-w-0">
                    <div className="absolute top-4 right-4 z-20">
                        <button onClick={() => window.print()} className="px-3 pt-3 pb-1.5 rounded-lg bg-white shadow-sm border border-slate-200 text-sm font-bold text-emerald-600 hover:bg-emerald-50 transition-all active:scale-95 flex items-center gap-1 leading-loose"><i className="bi bi-printer text-[15px] -mt-1"></i><span><Rb t="印刷" r="いんさつ"/></span></button>
                    </div>
                    <div className="flex-1 relative min-h-0 bg-slate-100/50 rounded-2xl">
                        <ScalableWrapper key={draft?.id || 'new'} externalScrollRatio={scrollRatio}>
                            <GenkoPaper draft={draft} settings={settings} corrections={adjustedCorrections} isTeacher={false} onClickCorrection={(cor) => setSelectedCor(cor)} />
                        </ScalableWrapper>
                    </div>
                </div>

                {/* コピー確認モーダル */}
                <Modal isOpen={isDuplicateConfirmOpen} onClose={() => setIsDuplicateConfirmOpen(false)} title={<><Rb t="作品" r="さくひん"/>のコピー</>} maxWidth="max-w-md">
                    <div className="space-y-4">
                        <p className="text-slate-700 font-bold leading-relaxed">
                            この<Rb t="作品" r="さくひん"/>は「<Rb t="完了" r="かんりょう"/>」しているため、そのまま<Rb t="編集" r="へんしゅう"/>することはできません。<br/><br/>
                            コピーして、<Rb t="新" r="あたら"/>しい<Rb t="作品" r="さくひん"/>として<Rb t="書" r="か"/>き<Rb t="直" r="なお"/>しますか？
                        </p>
                        <div className="flex gap-3 pt-4 border-t border-slate-100">
                            <button onClick={() => setIsDuplicateConfirmOpen(false)} className="flex-1 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 transition-all active:scale-95">キャンセル</button>
                            <button onClick={executeDuplicate} className="flex-1 py-3 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition-all active:scale-95 shadow-sm">コピーする</button>
                        </div>
                    </div>
                </Modal>

                {/* 添削確認モーダル */}
                <Modal isOpen={!!selectedCor} onClose={() => setSelectedCor(null)} title={<><Rb t="先生" r="せんせい"/>からのコメント</>} maxWidth="max-w-md">
                    {selectedCor && (
                        <div className="space-y-4">
                            <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl text-slate-800 font-medium leading-relaxed">
                                {selectedCor.comment.replace('【AI】', '')}
                            </div>
                            {/* 提出済み(ロック中)は完了ボタンを押せないようにする */}
                            {isLocked ? (
                                <button disabled className="w-full pt-5 pb-3 leading-loose bg-slate-300 text-white font-bold rounded-xl cursor-not-allowed"><Rb t="提出中" r="ていしゅつちゅう"/>のため<Rb t="変更不可" r="へんこうふか"/></button>
                            ) : (
                                <button onClick={handleResolveCorrection} className="w-full pt-5 pb-3 leading-loose bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition-all active:scale-95 shadow-sm"><Rb t="修正完了" r="しゅうせいかんりょう"/>（<Rb t="赤線" r="あかせん"/>を<Rb t="消" r="け"/>す）</button>
                            )}
                        </div>
                    )}
                </Modal>
            </div>
        );
    };

    const TeacherView = ({ db, settings, updateStatus, updateDraftInDB, onRefresh, selectedId, setSelectedId, setGlobalPrintDrafts, showLoading, hideLoading, showToast, showMiniToast }) => {
        const [checkedIds, setCheckedIds] = useState(new Set());
        const drafts = db.filter(d => d.status !== 'draft');
        
        const [searchQuery, setSearchQuery] = useState('');
        const [filterStatus, setFilterStatus] = useState('active');
        const [filterStartDate, setFilterStartDate] = useState('');
        const [filterEndDate, setFilterEndDate] = useState('');
        const [previewMode, setPreviewMode] = useState('genko');

        const filteredDrafts = useMemo(() => {
            return drafts.filter(d => {
                if (filterStatus === 'active' && d.status === 'completed') return false;
                if (filterStatus !== 'all' && filterStatus !== 'active' && d.status !== filterStatus) return false;
                if (filterStartDate || filterEndDate) {
                    const itemDate = d.updatedAt.split(' ')[0];
                    if (filterStartDate && itemDate < filterStartDate.replace(/-/g, '/')) return false;
                    if (filterEndDate && itemDate > filterEndDate.replace(/-/g, '/')) return false;
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    if (!(d.title?.toLowerCase().includes(q) || d.name?.toLowerCase().includes(q) || d.content?.toLowerCase().includes(q))) return false;
                }
                return true;
            });
        }, [drafts, filterStatus, filterStartDate, filterEndDate, searchQuery]);

        useEffect(() => {
            if (filteredDrafts.length > 0) {
                if (!selectedId || !filteredDrafts.find(d => d.id === selectedId)) setSelectedId(filteredDrafts[0].id);
            } else if (selectedId) setSelectedId(null);
        }, [filteredDrafts, selectedId, setSelectedId]);

        useEffect(() => {
            if (selectedId) {
                const d = db.find(x => x.id === selectedId);
                if (d) {
                    const pc = parseCorrectionData(d.correction, d.content);
                    if (pc.baseText && pc.baseText !== d.content) setPreviewMode('diff');
                    else setPreviewMode('genko');
                }
            }
        }, [selectedId, db]);

        const selectedDraft = db.find(d => d.id === selectedId);

        const [correctionModal, setCorrectionModal] = useState({ isOpen: false, text: '', start: null, end: null });
        const [deleteConfirmInfo, setDeleteConfirmInfo] = useState(null);
        const [isShortcutModalOpen, setIsShortcutModalOpen] = useState(false);

        // --- キーボードショートカット ---
        useEffect(() => {
            const handleKeyDown = (e) => {
                if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName) || e.target.isContentEditable) return;
                if (e.key === '?') { setIsShortcutModalOpen(prev => !prev); return; }
                if (e.key === 'Escape') {
                    setIsShortcutModalOpen(false); setCorrectionModal({ isOpen: false, text: '', start: null, end: null }); setDeleteConfirmInfo(null); return; 
                }

                const key = e.key.toLowerCase();
                if (key === 's' && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); toggleAll(); return; }
                if (key === 'u' && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); onRefresh(); return; }
                if (key === 'p' && e.shiftKey) { e.preventDefault(); handleBulkPrint(); return; }
                if (key === 'a' && e.shiftKey) { e.preventDefault(); handleBulkAiCorrection(); return; }

                if (!selectedDraft) return;
                
                const currentIndex = filteredDrafts.findIndex(d => d.id === selectedDraft.id);
                switch(key) {
                    case 'arrowup': e.preventDefault(); if (currentIndex > 0) setSelectedId(filteredDrafts[currentIndex - 1].id); break;
                    case 'arrowdown': e.preventDefault(); if (currentIndex < filteredDrafts.length - 1) setSelectedId(filteredDrafts[currentIndex + 1].id); break;
                    case 'c': e.preventDefault(); updateStatus(selectedDraft.id, 'completed'); break;
                    case 'r': e.preventDefault(); updateStatus(selectedDraft.id, 'rework'); break;
                    case 'v': e.preventDefault(); setPreviewMode(prev => prev === 'genko' ? 'diff' : 'genko'); break;
                    case 'a': if (!e.shiftKey) { e.preventDefault(); handleAiCorrection(); } break;
                    case 'p': if (!e.shiftKey) { e.preventDefault(); setGlobalPrintDrafts([selectedDraft]); setTimeout(()=>window.print(), 500); } break;
                }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [selectedDraft, filteredDrafts, checkedIds, previewMode]);

        const toggleCheck = (e, id) => {
            e.stopPropagation();
            const newSet = new Set(checkedIds);
            if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
            setCheckedIds(newSet);
        };

        const visibleIds = filteredDrafts.map(d => d.id);
        const allVisibleChecked = visibleIds.length > 0 && visibleIds.every(id => checkedIds.has(id));
        const toggleAll = () => {
            const newSet = new Set(checkedIds);
            if (allVisibleChecked) visibleIds.forEach(id => newSet.delete(id)); else visibleIds.forEach(id => newSet.add(id));
            setCheckedIds(newSet);
        };

        const handleCorrectionAdded = (start, end) => {
            setCorrectionModal({ isOpen: true, text: '', start, end });
        };

        const handleSaveCorrection = async () => {
            if (!selectedDraft || !correctionModal.text) return;
            const { start, end } = correctionModal;
            const displayStart = start;
            const displayEnd = end + 1;
            const currentContent = selectedDraft.content || '';
            let parsedCorrections = parseCorrectionData(selectedDraft.correction, currentContent);
            const currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
            const originalText = currentContent.substring(displayStart, displayEnd);
            currentItems.push({ id: crypto.randomUUID(), start: displayStart, end: displayEnd, comment: correctionModal.text, originalText, status: 'active' });
            
            const updatedDraft = { ...selectedDraft, correction: JSON.stringify({ baseText: currentContent, items: currentItems }) };
            
            updateDraftInDB(updatedDraft);
            setCorrectionModal({ isOpen: false, text: '', start:null, end:null });
            showMiniToast('添削を保存しました', 'success');

            try {
                // 先生は提出しないので false
                await runGAS('saveOrSubmitDraft', updatedDraft, false);
            } catch(e) {
                if(e.message !== 'OFFLINE_QUEUED') showToast('保存に失敗しました', 'error');
            }
        };

        const executeDeleteCorrection = () => {
            if (!deleteConfirmInfo) return;
            const currentContent = selectedDraft.content || '';
            let parsedCorrections = parseCorrectionData(selectedDraft.correction, currentContent);
            let currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
            const newItems = currentItems.filter(c => c.id !== deleteConfirmInfo.id);
            
            const updatedDraft = { ...selectedDraft, correction: JSON.stringify({ baseText: currentContent, items: newItems }) };
            
            updateDraftInDB(updatedDraft);
            setDeleteConfirmInfo(null);
            showMiniToast('添削を削除しました', 'success');

            // 先生は提出しないので false
            runGAS('saveOrSubmitDraft', updatedDraft, false).catch((e) => {
                if(e.message !== 'OFFLINE_QUEUED') showToast('削除に失敗しました', 'error');
            });
        };

        const handleAiCorrection = async () => {
            if (!selectedDraft) return;
            showLoading('AIが添削中...');
            try {
                const resultItems = await runGAS('analyzeEssayWithGemini', selectedDraft.title, selectedDraft.class, selectedDraft.content);
                if (!resultItems || resultItems.length === 0) { showToast('修正提案はありませんでした', 'success'); return; }
                
                const currentContent = selectedDraft.content || '';
                let parsedCorrections = parseCorrectionData(selectedDraft.correction, currentContent);
                let currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
                let addedCount = 0;
                
                (Array.isArray(resultItems) ? resultItems : []).forEach(aiItem => {
                    const idx = currentContent.indexOf(aiItem.quote);
                    if (idx !== -1) { currentItems.push({ id: crypto.randomUUID(), start: idx, end: idx + aiItem.quote.length, comment: '【AI】' + aiItem.comment, originalText: aiItem.quote, status: 'active' }); addedCount++; }
                });
                
                const updatedDraft = { ...selectedDraft, correction: JSON.stringify({ baseText: currentContent, items: currentItems }) };
                
                // 先生は提出しないので false
                await runGAS('saveOrSubmitDraft', updatedDraft, false);
                updateDraftInDB(updatedDraft);
                showToast(`${addedCount}件のAI提案を追加しました`, 'success');
            } catch(e) { showToast(e.message, 'error'); } finally { hideLoading(); }
        };

        const handleBulkAiCorrection = async () => {
            if (checkedIds.size === 0) return showToast('一括添削する作品にチェックを入れてください', 'error');
            
            const confirmResult = await Swal.fire({
                title: '一括AI添削の実行',
                text: `選択した ${checkedIds.size} 件の作品にAI添削を実行しますか？（少し時間がかかります）`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f59e0b',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: '実行する',
                cancelButtonText: 'キャンセル'
            });
            if (!confirmResult.isConfirmed) return;

            showLoading(`一括AI添削中... (0/${checkedIds.size})`);
            let successCount = 0; let total = checkedIds.size; let i = 0;
            for (let id of checkedIds) {
                i++; const d = drafts.find(x => x.id === id);
                if (d) {
                    showLoading(`一括AI添削中... (${i}/${total})\n${d.name}`);
                    try {
                        const resultItems = await runGAS('analyzeEssayWithGemini', d.title, d.class, d.content);
                        if (resultItems && resultItems.length > 0) {
                            const currentContent = d.content || '';
                            let parsedCorrections = parseCorrectionData(d.correction, currentContent);
                            let currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
                            (Array.isArray(resultItems) ? resultItems : []).forEach(aiItem => {
                                const idx = currentContent.indexOf(aiItem.quote);
                                if (idx !== -1) { currentItems.push({ id: crypto.randomUUID(), start: idx, end: idx + aiItem.quote.length, comment: '【AI】' + aiItem.comment, originalText: aiItem.quote, status: 'active' }); }
                            });
                            const updatedDraft = { ...d, correction: JSON.stringify({ baseText: currentContent, items: currentItems }) };
                            
                            // 先生は提出しないので false
                            await runGAS('saveOrSubmitDraft', updatedDraft, false);
                            updateDraftInDB(updatedDraft);
                        }
                        successCount++;
                    } catch(e){}
                }
            }
            hideLoading(); showToast(`${successCount} 件のAI添削が完了しました`, 'success');
        };

        const handleBulkComplete = async () => {
            if (checkedIds.size === 0) return;

            const confirmResult = await Swal.fire({
                title: '一括完了',
                text: `選択した ${checkedIds.size} 件を「完了」にしますか？`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: '完了にする',
                cancelButtonText: 'キャンセル'
            });
            if (!confirmResult.isConfirmed) return;

            const updates = Array.from(checkedIds).map(id => {
                const d = drafts.find(x => x.id === id);
                if (d) {
                    const newD = { ...d, status: 'completed' };
                    updateDraftInDB(newD);
                    return newD;
                }
                return null;
            }).filter(Boolean);
            
            setCheckedIds(new Set());
            showMiniToast(`${updates.length} 件を完了にしました`, 'success');

            // 先生は提出しないので false
            updates.forEach(d => {
                runGAS('saveOrSubmitDraft', d, false).catch(()=>{});
            });
        };

        const handleBulkPrint = () => {
            if (checkedIds.size === 0) return showToast('印刷する作品を選択してください', 'error');
            const printTargets = drafts.filter(d => checkedIds.has(d.id));
            setGlobalPrintDrafts(printTargets);
            setTimeout(() => window.print(), 500);
        };

        const adjustedCorrections = useMemo(() => {
            if (!selectedDraft) return [];
            const parsed = parseCorrectionData(selectedDraft.correction, selectedDraft.content);
            return getAdjustedCorrections(parsed.baseText, selectedDraft.content, parsed.items);
        }, [selectedDraft?.correction, selectedDraft?.content]);

        return (
            <div className="flex-1 flex bg-slate-100 no-print min-h-0">
                {/* サイドバー */}
                <div className="w-[340px] border-r border-slate-200 bg-white flex flex-col h-full overflow-hidden shadow-sm z-10 shrink-0">
                    <div className="p-4 border-b border-slate-100 bg-rose-50/50 text-rose-800 font-bold flex items-center justify-between shrink-0">
                        <div className="flex items-center gap-2"><i className="bi bi-person-gear text-[22px] text-rose-600"></i> 管理画面</div>
                        <div className="flex items-center gap-1">
                            <button onClick={() => setIsShortcutModalOpen(true)} className="p-1.5 hover:bg-rose-100 rounded-lg transition-all active:scale-90 text-rose-500" title="ショートカット"><i className="bi bi-question-circle text-[18px]"></i></button>
                            <button onClick={onRefresh} className="p-1.5 hover:bg-rose-100 rounded-lg transition-all active:scale-90 text-rose-600" title="更新"><i className="bi bi-arrow-clockwise text-[18px]"></i></button>
                        </div>
                    </div>

                    <div className="p-3 border-b border-slate-100 bg-slate-50 flex flex-col gap-2 shrink-0">
                        <div className="relative">
                            <i className="bi bi-search absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="text" placeholder="キーワード (名前・題名・本文)" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="w-full pl-8 pr-2 py-1.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-rose-100 focus:border-rose-400 transition-all" />
                        </div>
                        <div className="flex flex-col gap-2">
                            <select value={filterStatus} onChange={(e)=>setFilterStatus(e.target.value)} className="w-full border border-slate-200 rounded-lg text-sm py-1.5 px-2 focus:outline-none focus:ring-2 focus:ring-rose-100 focus:border-rose-400 bg-white transition-all text-slate-600 cursor-pointer">
                                <option value="active">完了以外</option>
                                <option value="all">すべて表示</option>
                                <option value="submitted">提出済</option>
                                <option value="rework">再提出</option>
                                <option value="completed">完了</option>
                            </select>
                            <div className="flex gap-1 items-center">
                                <input type="date" value={filterStartDate} onChange={(e)=>setFilterStartDate(e.target.value)} className="flex-1 border border-slate-200 rounded-lg text-xs py-1.5 px-1 focus:outline-none focus:ring-2 focus:ring-rose-100 focus:border-rose-400 bg-white transition-all text-slate-600 text-center cursor-pointer" />
                                <span className="text-slate-400 text-xs">〜</span>
                                <input type="date" value={filterEndDate} onChange={(e)=>setFilterEndDate(e.target.value)} className="flex-1 border border-slate-200 rounded-lg text-xs py-1.5 px-1 focus:outline-none focus:ring-2 focus:ring-rose-100 focus:border-rose-400 bg-white transition-all text-slate-600 text-center cursor-pointer" />
                            </div>
                        </div>
                    </div>

                    <div className="p-2 border-b border-slate-100 bg-white flex items-center gap-2 text-sm shrink-0">
                        <button onClick={toggleAll} className="p-1 hover:bg-slate-100 rounded text-slate-500" title="表示中の作品をすべて選択"><i className={`bi ${allVisibleChecked ? 'bi-check-square-fill text-rose-500' : 'bi-square'}`}></i></button>
                        <span className="text-slate-600 font-medium">一括操作:</span>
                        <button onClick={handleBulkAiCorrection} disabled={checkedIds.size===0} className="ml-auto p-1.5 text-amber-600 hover:bg-amber-50 rounded disabled:opacity-50 transition-colors" title="一括AI添削 (Shift + A)"><i className="bi bi-magic"></i></button>
                        <button onClick={handleBulkComplete} disabled={checkedIds.size===0} className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded disabled:opacity-50 transition-colors" title="完了にする"><i className="bi bi-check-circle-fill"></i></button>
                        <button onClick={handleBulkPrint} disabled={checkedIds.size===0} className="p-1.5 text-slate-600 hover:bg-slate-100 rounded disabled:opacity-50 transition-colors" title="一括印刷 (Shift + P)"><i className="bi bi-printer-fill"></i></button>
                    </div>

                    <div className="flex-1 overflow-auto hide-scrollbar">
                        {filteredDrafts.length === 0 && <div className="p-5 text-center text-slate-400 text-sm font-bold mt-4">該当する作品がありません</div>}
                        {filteredDrafts.map(d => (
                            <div key={d.id} onClick={() => setSelectedId(d.id)} className={`p-4 border-b border-slate-100 cursor-pointer transition-all active:scale-[0.99] flex gap-3 ${selectedId === d.id ? 'bg-rose-50 border-l-4 border-l-rose-500 shadow-inner' : 'hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                                <div className="pt-0.5" onClick={e => toggleCheck(e, d.id)}>
                                    <i className={`bi text-[18px] ${checkedIds.has(d.id) ? 'bi-check-square-fill text-rose-500' : 'bi-square text-slate-300'}`}></i>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="flex justify-between items-center mb-1.5">
                                        <span className="font-bold text-slate-700 truncate">{d.name}</span>
                                        <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold text-white shadow-sm shrink-0 ${d.status === 'completed' ? 'bg-emerald-500' : d.status === 'rework' ? 'bg-amber-500' : 'bg-blue-500'}`}>
                                            {d.status === 'completed' ? '完了' : d.status === 'rework' ? '再提出' : '提出済'}
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center text-xs text-slate-500">
                                        <span className="truncate">{d.title}</span>
                                        {parseCorrectionData(d.correction, d.content).baseText && parseCorrectionData(d.correction, d.content).baseText !== d.content && (
                                            <i className="bi bi-file-diff text-blue-500" title="差分あり"></i>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* プレビュー領域 */}
                <div className="flex-1 flex flex-col bg-slate-100/50 min-w-0">
                    {selectedDraft ? (
                        <>
                            <div className="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shadow-sm z-10 shrink-0 overflow-x-auto hide-scrollbar">
                                <div className="font-bold text-slate-800 flex items-center gap-2 truncate min-w-0 shrink mr-4">
                                    <span className="text-slate-400 font-normal shrink-0">{selectedDraft.class}</span>
                                    <span className="shrink-0">{selectedDraft.name}</span>
                                    <span className="text-slate-300 shrink-0">|</span>
                                    <span className="truncate">{selectedDraft.title}</span>
                                </div>
                                
                                <div className="flex items-center gap-2 shrink-0">
                                    <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 mr-2">
                                        <button onClick={() => setPreviewMode('genko')} className={`px-3 py-1.5 text-sm font-bold rounded-lg transition-all ${previewMode === 'genko' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`} title="原稿用紙 (V)">原稿用紙</button>
                                        <button onClick={() => setPreviewMode('diff')} className={`px-3 py-1.5 text-sm font-bold rounded-lg transition-all flex items-center gap-1 ${previewMode === 'diff' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`} title="差分 (V)">
                                            <i className="bi bi-file-diff"></i> 差分
                                        </button>
                                    </div>

                                    <button onClick={handleAiCorrection} className="px-3 py-1.5 rounded-lg text-sm font-bold bg-amber-100 text-amber-700 hover:bg-amber-200 transition-all active:scale-95 flex items-center gap-1" title="AI添削 (A)"><i className="bi bi-magic"></i> AI添削</button>
                                    <div className="w-px h-6 bg-slate-200 mx-1"></div>
                                    <button onClick={() => updateStatus(selectedDraft.id, 'rework')} className="px-4 py-1.5 rounded-full text-sm font-bold border border-rose-500 text-rose-500 hover:bg-rose-50 hover:shadow-sm transition-all active:scale-95" title="再提出にする (R)">再提出</button>
                                    <button onClick={() => updateStatus(selectedDraft.id, 'completed')} className="px-4 py-1.5 rounded-full text-sm font-bold bg-emerald-500 text-white hover:bg-emerald-600 hover:shadow-md transition-all active:scale-95 flex items-center gap-1" title="完了にする (C)"><i className="bi bi-check-circle text-[16px]"></i> 完了</button>
                                </div>
                            </div>
                            
                            <div className="flex-1 relative min-h-0 bg-slate-100/50 rounded-b-2xl">
                                {previewMode === 'genko' && (
                                    <div className="absolute top-4 left-4 z-20 bg-white/90 backdrop-blur px-4 py-2 rounded-xl shadow-sm border border-slate-200 text-sm font-bold text-slate-500 flex items-center gap-2 pointer-events-none">
                                        <i className="bi bi-info-circle text-rose-500 text-[18px]"></i> 文字をドラッグして添削
                                    </div>
                                )}
                                <ScalableWrapper key={selectedDraft.id + previewMode}>
                                    {previewMode === 'genko' ? (
                                        <GenkoPaper draft={selectedDraft} settings={settings} corrections={adjustedCorrections} isTeacher={true} onCorrectionAdded={handleCorrectionAdded} onClickCorrection={(cor) => setDeleteConfirmInfo(cor)} />
                                    ) : (
                                        <DiffViewer draft={selectedDraft} />
                                    )}
                                </ScalableWrapper>
                            </div>
                        </>
                    ) : (
                        <div className="flex-1 flex items-center justify-center">
                            <div className="text-center">
                                <i className="bi bi-pencil-square text-[48px] mx-auto text-slate-300 mb-4"></i>
                                <div className="text-slate-500 font-bold text-lg">リストから作品を選択してください</div>
                            </div>
                        </div>
                    )}
                </div>

                <Modal isOpen={correctionModal.isOpen} onClose={() => { setCorrectionModal({isOpen:false, text:'', start:null, end:null}); }} title="添削コメントの追加" maxWidth="max-w-md">
                    <div className="space-y-4">
                        <textarea value={correctionModal.text} onChange={e => setCorrectionModal(prev => ({...prev, text: e.target.value}))} placeholder="修正指示やアドバイスを入力..." className="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-rose-400 focus:ring-2 focus:ring-rose-100 resize-none text-slate-800"></textarea>
                        <button onClick={handleSaveCorrection} className="w-full py-3 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 transition-all active:scale-95 shadow-sm">追加する</button>
                    </div>
                </Modal>

                <Modal isOpen={!!deleteConfirmInfo} onClose={() => setDeleteConfirmInfo(null)} title="添削の確認" maxWidth="max-w-md">
                    <div className="space-y-4">
                        <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl text-slate-800 font-medium leading-relaxed">
                            {deleteConfirmInfo?.comment.replace('【AI】', '')}
                        </div>
                        <div className="flex gap-3 pt-4">
                            <button onClick={() => setDeleteConfirmInfo(null)} className="flex-1 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 transition-all active:scale-95">閉じる</button>
                            <button onClick={executeDeleteCorrection} className="flex-1 py-3 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 transition-all active:scale-95 shadow-sm">削除する</button>
                        </div>
                    </div>
                </Modal>

                <Modal isOpen={isShortcutModalOpen} onClose={() => setIsShortcutModalOpen(false)} title={<><i className="bi bi-keyboard mr-2"></i>ショートカット一覧</>} maxWidth="max-w-xl">
                    <div className="space-y-2">
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">児童の切り替え</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">↑ / ↓</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">表示切り替え（原稿/差分）</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">V</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">一括選択 / 解除</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">S</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">リストの更新</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">U</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">AI添削</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">A</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">一括AI添削（チェックを入れた作品）</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">Shift + A</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">印刷（選択中の作品）</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">P</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-slate-600 font-bold">一括印刷（チェックを入れた作品）</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">Shift + P</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-emerald-600 font-bold">完了にする</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">C</span></div>
                        <div className="flex justify-between items-center p-3 border-b border-slate-100"><span className="text-rose-600 font-bold">再提出にする</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">R</span></div>
                        <div className="flex justify-between items-center p-3"><span className="text-slate-600 font-bold">ショートカット一覧の表示</span><span className="bg-slate-100 px-2 py-1 rounded text-slate-600 font-mono text-sm border border-slate-200 shadow-sm">?</span></div>
                    </div>
                </Modal>
            </div>
        );
    };

    const TeacherSettingsModal = ({ isOpen, onClose, showLoading, hideLoading, showToast }) => {
        const [apiKey, setApiKey] = useState('');
        const [password, setPassword] = useState('');

        const handleSave = async () => {
            showLoading('システム設定を保存中...');
            try {
                if (apiKey) await runGAS('setGeminiApiKey', apiKey);
                if (password) await runGAS('updateTeacherPassword', password);
                showToast('設定を保存しました。', 'success');
                onClose();
            } catch(e) {
                showToast('保存エラー。', 'error');
            } finally {
                hideLoading();
            }
        };

        return (
            <Modal isOpen={isOpen} onClose={onClose} title={<><i className="bi bi-gear-fill text-rose-500 mr-2"></i>システム設定</>} maxWidth="max-w-md">
                <div className="space-y-6">
                    <div className="bg-rose-50 p-4 rounded-xl border border-rose-100 mb-4">
                        <p className="text-sm text-rose-800 font-bold">※ この設定画面は児童には表示されません。</p>
                    </div>
                    <div>
                        <h4 className="font-bold text-slate-700 mb-2">ログインパスワードの変更</h4>
                        <input type="text" value={password} onChange={e=>setPassword(e.target.value)} placeholder="新しいパスワードを入力" className="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100" />
                    </div>
                    <div>
                        <h4 className="font-bold text-slate-700 mb-2">Gemini APIキーの設定</h4>
                        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="AI添削用APIキー" className="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100" />
                    </div>
                    <div className="flex justify-end pt-4 border-t border-slate-100">
                        <button onClick={handleSave} className="px-6 py-2 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-700 transition-all active:scale-95 shadow-sm">保存して閉じる</button>
                    </div>
                </div>
            </Modal>
        );
    };

    function App() {
      const [mode, setMode] = useState('student'); 
      const [db, setDb] = useState([]);
      
      const [activeDraft, setActiveDraft] = useState(() => {
        const saved = localStorage.getItem(AUTOSAVE_KEY);
        if (saved) { try { return JSON.parse(saved); } catch(e) {} }
        return { title: '', class: '', name: '', content: '', status: 'draft', correction: '' };
      });
      const [teacherPassword, setTeacherPassword] = useState('');
      const [teacherSelectedId, setTeacherSelectedId] = useState(null);
      const [globalPrintDrafts, setGlobalPrintDrafts] = useState([]); 
      
      const [loading, setLoading] = useState({ isVisible: false, text: '' });
      const [toast, setToast] = useState({ isVisible: false, message: '', type: 'success' });
      const [miniToast, setMiniToast] = useState({ isVisible: false, message: '', type: 'success' });
      
      const [isLoadModalOpen, setLoadModalOpen] = useState(false);
      const [isSettingsModalOpen, setSettingsModalOpen] = useState(false);
      const [isTeacherSettingsModalOpen, setIsTeacherSettingsModalOpen] = useState(false);
      const [isTeacherAuthModalOpen, setTeacherAuthModalOpen] = useState(false);
      const [isNewConfirmOpen, setIsNewConfirmOpen] = useState(false);
      
      // 返却通知用の状態
      const [readReceipts, setReadReceipts] = useState(() => {
          try { return JSON.parse(localStorage.getItem(READ_RECEIPTS_KEY) || '{}'); } catch(e) { return {}; }
      });
      const [returnedDrafts, setReturnedDrafts] = useState([]);
      const [isNotificationModalOpen, setNotificationModalOpen] = useState(false);

      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem(SETTINGS_KEY);
        if (saved) return JSON.parse(saved);
        return { charsPerLine: 20, kinsokuMode: 'oidashi' };
      });

      useEffect(() => { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }, [settings]);
      useEffect(() => { localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(activeDraft)); }, [activeDraft]);
      useEffect(() => { if (mode === 'student') setGlobalPrintDrafts([activeDraft]); }, [mode, activeDraft]);

      // オフライン復帰時の処理登録
      useEffect(() => {
          const handleOnline = () => processQueue(showMiniToast);
          window.addEventListener('online', handleOnline);
          return () => window.removeEventListener('online', handleOnline);
      }, [showMiniToast]);

      const showToast = useCallback((message, type = 'success') => setToast({ isVisible: true, message, type }), []);
      const showMiniToast = useCallback((message, type = 'success') => setMiniToast({ isVisible: true, message, type }), []);
      const showLoading = useCallback((text) => setLoading({ isVisible: true, text }), []);
      const hideLoading = useCallback(() => setLoading({ isVisible: false, text: '' }), []);

      // 起動時およびモード変更時に児童の返却状態をチェック
      const checkReturnedAssignments = useCallback(async () => {
          if (mode !== 'student') return;
          try {
              const res = await runGAS('getDraftList', 'student');
              if (res.status === 'success') {
                  const allReturned = res.data.filter(d => ['rework', 'completed', 'returned'].includes(d.status));
                  setReturnedDrafts(allReturned);
              }
          } catch(e) {}
      }, [mode]);

      useEffect(() => { checkReturnedAssignments(); }, [checkReturnedAssignments]);

      const unreadCount = useMemo(() => {
          return returnedDrafts.filter(d => readReceipts[d.id] !== d.updatedAt).length;
      }, [returnedDrafts, readReceipts]);

      const handleSwitchMode = async (newMode) => {
        if (newMode === 'teacher') {
          if (teacherPassword) { handleRefreshTeacher(); setMode('teacher'); } 
          else { setTeacherAuthModalOpen(true); }
        } else { setMode(newMode); }
      };

      const handleTeacherAuth = async (pass) => {
        if (!pass) return;
        setTeacherAuthModalOpen(false); showLoading(<><Rb t="認証" r="にんしょう"/>とデータ<Rb t="取得中" r="しゅとくちゅう"/>...</>);
        try {
          const res = await runGAS('getDraftList', 'teacher', pass);
          if (res.status === 'success') { setDb(res.data); setTeacherPassword(pass); setMode('teacher'); showToast('ログインしました', 'success'); } 
          else { showToast(res.message, 'error'); }
        } catch (e) { showToast(<><Rb t="通信" r="つうしん"/>エラーが<Rb t="発生" r="はっせい"/>しました</>, 'error'); } 
        finally { hideLoading(); }
      };

      const handleSaveDraft = async (isSubmit = false) => {
        showLoading(isSubmit ? <><Rb t="提出中" r="ていしゅつちゅう"/>...</> : <><Rb t="保存中" r="ほぞんちゅう"/>...</>);
        try {
          const res = await runGAS('saveOrSubmitDraft', activeDraft, isSubmit);
          if (res.status === 'success') {
            setActiveDraft(prev => ({ ...prev, id: res.id, status: res.docStatus }));
            showToast(isSubmit ? <><Rb t="先生" r="せんせい"/>に<Rb t="提出" r="ていしゅつ"/>しました！</> : <><Rb t="保存" r="ほぞん"/>しました</>, 'success');
          } else { showToast(res.message, 'error'); }
        } catch (e) {
          if(e.message === 'OFFLINE_QUEUED') {
              // 提出時は状態だけローカルで変えておく
              if (isSubmit) setActiveDraft(prev => ({ ...prev, status: 'submitted' }));
              showToast('オフラインのため端末に保存しました。通信回復時に自動で送信されます。', 'success');
          } else {
              showToast(<>サーバーと<Rb t="通信" r="つうしん"/>できませんでした</>, 'error');
          }
        } finally { hideLoading(); }
      };

      const openLoadModal = async () => {
        showLoading(<><Rb t="保存" r="ほぞん"/>されたデータを<Rb t="探" r="さが"/>しています...</>);
        try {
          const res = await runGAS('getDraftList', 'student');
          if (res.status === 'success') { setDb(res.data); setLoadModalOpen(true); } 
          else { showToast(res.message, 'error'); }
        } catch (e) { showToast('通信エラー', 'error'); } 
        finally { hideLoading(); }
      };

      // 楽観的UIを適用したステータス更新
      const updateTeacherStatus = async (id, newStatus) => {
        const targetDraft = db.find(d => d.id === id); if (!targetDraft) return;
        const prevStatus = targetDraft.status;
        const dataToSave = { ...targetDraft, status: newStatus };
        
        // 即座にUI更新 (Loadingを出さない)
        updateDraftInDB(dataToSave);
        showMiniToast(`ステータスを「${newStatus === 'completed' ? '完了' : '再提出'}」にしました`);

        try {
          // ★ 修正：先生は提出フラグを立ててはいけないので常に false
          await runGAS('saveOrSubmitDraft', dataToSave, false);
        } catch (e) {
          if (e.message !== 'OFFLINE_QUEUED') {
              // 失敗時のみロールバック
              updateDraftInDB({ ...targetDraft, status: prevStatus });
              showToast('通信エラーのため元に戻しました', 'error');
          }
        }
      };

      const updateDraftInDB = useCallback((updatedDraft) => {
          setDb(prev => prev.map(d => d.id === updatedDraft.id ? updatedDraft : d));
          if (activeDraft.id === updatedDraft.id) setActiveDraft(updatedDraft);
      }, [activeDraft.id]);

      const handleRefreshTeacher = async () => {
        showLoading('更新中...');
        try {
          const res = await runGAS('getDraftList', 'teacher', teacherPassword);
          if (res.status === 'success') { setDb(res.data); showToast('最新のリストを取得しました'); } 
          else { showToast(res.message, 'error'); }
        } catch (e) { showToast('通信エラー', 'error'); } 
        finally { hideLoading(); }
      };

      const handleNewDraft = () => {
        if (activeDraft.content || activeDraft.title) setIsNewConfirmOpen(true);
        else executeNewDraft();
      };

      const executeNewDraft = () => {
        setActiveDraft({ title: '', class: '', name: '', content: '', status: 'draft', correction: '' });
        setIsNewConfirmOpen(false);
      };

      const handleSettingsClick = () => {
          if (mode === 'teacher') setIsTeacherSettingsModalOpen(true);
          else setSettingsModalOpen(true);
      };

      // 生徒用：保存したデータを開くモーダル内の検索ステート
      const [loadSearchQuery, setLoadSearchQuery] = useState('');
      const [loadStartDate, setLoadStartDate] = useState('');
      const [loadEndDate, setLoadEndDate] = useState('');
      const filteredLoadData = useMemo(() => {
          return db.filter(d => {
              if (loadSearchQuery) {
                  const q = loadSearchQuery.toLowerCase();
                  if (!(d.title?.toLowerCase().includes(q) || d.name?.toLowerCase().includes(q) || d.content?.toLowerCase().includes(q))) return false;
              }
              if (loadStartDate || loadEndDate) {
                  const itemDate = d.updatedAt.split(' ')[0];
                  if (loadStartDate && itemDate < loadStartDate.replace(/-/g, '/')) return false;
                  if (loadEndDate && itemDate > loadEndDate.replace(/-/g, '/')) return false;
              }
              return true;
          });
      }, [db, loadSearchQuery, loadStartDate, loadEndDate]);

      const handleOpenReturnedDraft = async (d) => {
          // 既読処理
          const newReceipts = { ...readReceipts, [d.id]: d.updatedAt };
          setReadReceipts(newReceipts);
          localStorage.setItem(READ_RECEIPTS_KEY, JSON.stringify(newReceipts));
          
          if (activeDraft.content || activeDraft.title) {
              const confirmResult = await Swal.fire({
                  title: '作業中の内容があります',
                  text: '返却された作文を開くと、現在入力中の内容は消えてしまいます。開きますか？',
                  icon: 'warning',
                  showCancelButton: true,
                  confirmButtonColor: '#ef4444',
                  cancelButtonColor: '#94a3b8',
                  confirmButtonText: '開く（今の内容は破棄）',
                  cancelButtonText: 'キャンセル'
              });
              if (!confirmResult.isConfirmed) return;
          }
          
          showLoading(<><Rb t="読" r="よ"/>み<Rb t="込" r="こ"/>み<Rb t="中" r="ちゅう"/>...</>);
          try {
              const res = await runGAS('loadDraft', d.id);
              if (res.status === 'success') {
                  setActiveDraft(res.data);
                  setNotificationModalOpen(false);
              } else {
                  showToast(res.message, 'error');
              }
          } catch(e) {
              showToast('通信エラー', 'error');
          } finally {
              hideLoading();
          }
      };

      return (
        <div className="min-h-screen flex flex-col bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
          <style>{GLOBAL_STYLES}</style>
          <LoadingOverlay isVisible={loading.isVisible} text={loading.text} />
          <ToastMessage isVisible={toast.isVisible} message={toast.message} type={toast.type} onClose={() => setToast(prev => ({...prev, isVisible: false}))} />
          <MiniToast isVisible={miniToast.isVisible} message={miniToast.message} type={miniToast.type} onClose={() => setMiniToast(prev => ({...prev, isVisible: false}))} />
          <TeacherAuthModal isOpen={isTeacherAuthModalOpen} onClose={() => setTeacherAuthModalOpen(false)} onSubmit={handleTeacherAuth} />
          <TeacherSettingsModal isOpen={isTeacherSettingsModalOpen} onClose={() => setIsTeacherSettingsModalOpen(false)} showLoading={showLoading} hideLoading={hideLoading} showToast={showToast} />

          <nav className="flex-shrink-0 z-40 w-full bg-white border-b border-slate-200 shadow-sm transition-colors duration-300 no-print" style={{ borderBottomColor: mode === 'teacher' ? '#f43f5e' : '#3b82f6', borderBottomWidth: '3px' }}>
            <div className="px-6 py-2.5 flex items-center justify-between w-full">
              <button onClick={() => handleSwitchMode('student')} className="flex items-center gap-3 hover:opacity-80 transition-all active:scale-95">
                <div className={`p-2 rounded-xl text-white shadow-sm transition-colors ${mode === 'teacher' ? 'bg-rose-500' : 'bg-blue-500'}`}>
                  <i className="bi bi-pencil-square text-[24px]"></i>
                </div>
                <div className="flex items-baseline gap-2">
                  <span className={`font-bold text-xl tracking-wide pt-2 ${mode === 'teacher' ? 'text-rose-600' : 'text-blue-600'}`}>
                    オンライン<Rb t="原稿用紙" r="げんこうようし"/>
                  </span>
                  <span className={`px-2 py-0.5 rounded-full text-xs font-bold text-white shadow-sm ${mode === 'teacher' ? 'bg-rose-500' : 'bg-blue-500'}`}>Pro</span>
                </div>
              </button>
              <div className="flex items-center gap-3">
                {mode === 'student' && returnedDrafts.length > 0 && (
                    <button onClick={() => setNotificationModalOpen(true)} className="relative p-2 pt-3 text-amber-500 hover:bg-slate-100 rounded-full transition-all active:scale-95" title="通知">
                        <i className="bi bi-bell-fill text-[22px]"></i>
                        {unreadCount > 0 && (
                            <span className="absolute top-1 right-1 w-4 h-4 bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white shadow-sm">
                                {unreadCount}
                            </span>
                        )}
                    </button>
                )}
                <button onClick={handleSettingsClick} className="p-2 pt-3 text-slate-500 hover:bg-slate-100 rounded-full transition-all active:scale-95" title="設定">
                  <i className="bi bi-gear text-[22px]"></i>
                </button>
                <button onClick={() => handleSwitchMode('teacher')} className={`px-4 pt-3 pb-2 rounded-full text-sm font-bold flex items-center gap-2 border transition-all active:scale-95 ${mode === 'teacher' ? 'bg-rose-50 border-rose-200 text-rose-700 shadow-sm' : 'border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-rose-200 hover:text-rose-600'}`}>
                  <i className="bi bi-person-gear text-[18px] -mt-1"></i> <span><Rb t="先生用" r="せんせいよう"/></span>
                </button>
              </div>
            </div>
          </nav>

          <main className="flex-1 overflow-hidden flex flex-col no-print relative">
            {mode === 'student' && <StudentView draft={activeDraft} settings={settings} updateDraft={(updates) => setActiveDraft(prev => ({...prev, ...updates}))} onSave={handleSaveDraft} onNew={handleNewDraft} openLoadModal={openLoadModal} showToast={showToast} showMiniToast={showMiniToast} showLoading={showLoading} hideLoading={hideLoading} />}
            {mode === 'teacher' && <TeacherView db={db} settings={settings} updateStatus={updateTeacherStatus} updateDraftInDB={updateDraftInDB} onRefresh={handleRefreshTeacher} selectedId={teacherSelectedId} setSelectedId={setTeacherSelectedId} setGlobalPrintDrafts={setGlobalPrintDrafts} showLoading={showLoading} hideLoading={hideLoading} showToast={showToast} showMiniToast={showMiniToast} />}
          </main>

          <footer className="flex-shrink-0 w-full bg-white border-t border-slate-200 pt-3 pb-2 text-center text-sm text-slate-500 font-bold no-print z-40 shadow-sm relative">
            ©2026 オンライン原稿用紙 Pro <a href="https://note.com/cute_borage86" target="_blank" rel="noopener noreferrer" className="text-inherit no-underline hover:opacity-80 transition-opacity">GIGA山</a>
          </footer>

          <div className="print-only">
             {globalPrintDrafts.map(d => (
                 <div key={d.id}>
                    <PrintGenkoView draft={d} settings={settings} />
                 </div>
             ))}
          </div>

          {/* モーダル群 (新規確認、ロード、通知、設定) */}
          <Modal isOpen={isNewConfirmOpen} onClose={() => setIsNewConfirmOpen(false)} title={<><Rb t="新規作成" r="しんきさくせい"/>の<Rb t="確認" r="かくにん"/></>} maxWidth="max-w-md">
              <div className="space-y-4">
                  <p className="text-slate-700 font-bold leading-relaxed">
                      げんざい<Rb t="書" r="か"/>いている<Rb t="内容" r="ないよう"/>はクリアされます。<br/>
                      <span className="text-sm text-blue-500">（<Rb t="保存" r="ほぞん"/>していない<Rb t="場合" r="ばあい"/>は<Rb t="消" r="き"/>えてしまいます）</span><br/><br/>
                      ほんとうに あたらしく<Rb t="書" r="か"/>きはじめますか？
                  </p>
                  <div className="flex gap-3 pt-4">
                      <button onClick={() => setIsNewConfirmOpen(false)} className="flex-1 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 transition-all active:scale-95">キャンセル</button>
                      <button onClick={executeNewDraft} className="flex-1 py-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition-all active:scale-95 shadow-sm">あたらしく<Rb t="書" r="か"/>く</button>
                  </div>
              </div>
          </Modal>

          <Modal isOpen={isLoadModalOpen} onClose={() => setLoadModalOpen(false)} title={<><Rb t="保存" r="ほぞん"/>した<Rb t="作品" r="さくひん"/>を<Rb t="開" r="ひら"/>く</>} maxWidth="max-w-xl">
              {db.length === 0 ? <div className="text-center text-slate-400 py-10 pt-12 font-bold"><Rb t="保存" r="ほぞん"/>されたデータがありません</div> : (
                <div className="space-y-4">
                  <div className="flex flex-col gap-2 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <div className="relative">
                        <i className="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="text" placeholder="キーワードでさがす" value={loadSearchQuery} onChange={(e)=>setLoadSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all font-bold" />
                    </div>
                    <div className="flex gap-2 items-center">
                        <input type="date" value={loadStartDate} onChange={(e)=>setLoadStartDate(e.target.value)} className="flex-1 border border-slate-200 rounded-lg text-sm py-2 px-2 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 bg-white transition-all text-slate-600 text-center font-bold" />
                        <span className="text-slate-400 font-bold">〜</span>
                        <input type="date" value={loadEndDate} onChange={(e)=>setLoadEndDate(e.target.value)} className="flex-1 border border-slate-200 rounded-lg text-sm py-2 px-2 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 bg-white transition-all text-slate-600 text-center font-bold" />
                    </div>
                  </div>
                  
                  <div className="space-y-2 max-h-[40vh] overflow-y-auto pr-2 hide-scrollbar">
                      {filteredLoadData.length === 0 ? (
                          <div className="text-center text-slate-400 py-6 font-bold">みつかりませんでした</div>
                      ) : (
                          filteredLoadData.map(d => (
                            <div key={d.id} onClick={() => { setActiveDraft(d); setLoadModalOpen(false); }} className="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-xl hover:border-blue-300 hover:shadow-md cursor-pointer transition-all active:scale-[0.98] group">
                              <div className="min-w-0">
                                <div className="font-bold text-slate-800 text-lg group-hover:text-blue-600 transition-colors pt-2 truncate">{d.title || <Rb t="無題" r="むだい"/>}</div>
                                <div className="text-sm text-slate-500 mt-1 truncate">{d.class} {d.name}</div>
                              </div>
                              <div className="flex flex-col items-end gap-1 shrink-0 ml-4">
                                <span className={`px-3 pt-2 pb-1 rounded-full text-xs font-bold text-white shadow-sm ${d.status==='submitted'?'bg-blue-500':d.status==='completed'?'bg-emerald-500':d.status==='rework'?'bg-amber-500':'bg-slate-400'}`}>
                                  {d.status==='submitted'?<Rb t="提出済" r="ていしゅつずみ"/>:d.status==='completed'?<Rb t="完了" r="かんりょう"/>:d.status==='rework'?<Rb t="再提出" r="さいていしゅつ"/>:<><Rb t="下書" r="したが"/>き</>}
                                </span>
                                <span className="text-xs text-slate-400 font-bold">{d.updatedAt}</span>
                              </div>
                            </div>
                          ))
                      )}
                  </div>
                </div>
              )}
          </Modal>

          <Modal isOpen={isNotificationModalOpen} onClose={() => setNotificationModalOpen(false)} title={<><i className="bi bi-bell-fill text-amber-500 mr-2"></i><Rb t="先生" r="せんせい"/>からの<Rb t="返却" r="へんきゃく"/></>} maxWidth="max-w-xl">
              {returnedDrafts.length === 0 ? <div className="text-center text-slate-400 py-10 pt-12 font-bold">まだ<Rb t="返却" r="へんきゃく"/>されたものはありません</div> : (
                <div className="space-y-2 max-h-[50vh] overflow-y-auto pr-2 hide-scrollbar">
                  {returnedDrafts.map(d => {
                      const isUnread = readReceipts[d.id] !== d.updatedAt;
                      return (
                          <div key={d.id} className={`flex items-center justify-between p-4 rounded-xl border transition-all ${isUnread ? 'bg-amber-50 border-amber-200 shadow-sm' : 'bg-slate-50 border-slate-200'}`}>
                            <div className="min-w-0">
                              <div className="flex items-center gap-2">
                                  <span className={`text-xs font-bold px-2 py-0.5 rounded shadow-sm text-white ${d.status === 'completed' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                      {d.status === 'completed' ? '完了' : '再提出'}
                                  </span>
                                  {isUnread && <span className="bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-sm animate-pulse">New</span>}
                              </div>
                              <div className="font-bold text-slate-800 text-lg pt-2 truncate mt-1">{d.title || <Rb t="無題" r="むだい"/>}</div>
                              <div className="text-xs text-slate-500 mt-1">{d.updatedAt}</div>
                            </div>
                            <button onClick={() => handleOpenReturnedDraft(d)} className={`shrink-0 ml-4 px-4 py-2 rounded-lg font-bold transition-all active:scale-95 ${isUnread ? 'bg-amber-500 text-white shadow-sm hover:bg-amber-600' : 'bg-white border border-slate-300 text-slate-600 hover:bg-slate-50'}`}>
                                <Rb t="確認" r="かくにん"/>する
                            </button>
                          </div>
                      );
                  })}
                </div>
              )}
          </Modal>

          <Modal isOpen={isSettingsModalOpen} onClose={() => setSettingsModalOpen(false)} title={<><Rb t="設定" r="せってい"/></>} maxWidth="max-w-md">
            <div className="space-y-6">
              <div>
                <h4 className="font-bold text-slate-700 mb-3 pt-2"><Rb t="用紙" r="ようし"/>の<Rb t="文字数" r="もじすう"/></h4>
                <div className="space-y-3">
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="chars" checked={settings.charsPerLine === 20} onChange={() => setSettings({...settings, charsPerLine: 20})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2">20<Rb t="文字" r="もじ"/> × 20<Rb t="行" r="ぎょう"/> (<Rb t="高学年" r="こうがくねん"/>)</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="chars" checked={settings.charsPerLine === 15} onChange={() => setSettings({...settings, charsPerLine: 15})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2">15<Rb t="文字" r="もじ"/> × 16<Rb t="行" r="ぎょう"/> (<Rb t="低学年" r="ていがくねん"/>)</span>
                  </label>
                </div>
              </div>
              <div>
                <h4 className="font-bold text-slate-700 mb-3 pt-2"><Rb t="禁則処理" r="きんそくしょり"/></h4>
                <div className="space-y-3">
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="kinsoku" checked={settings.kinsokuMode === 'oidashi'} onChange={() => setSettings({...settings, kinsokuMode: 'oidashi'})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2"><Rb t="追" r="お"/>い<Rb t="出" r="だ"/>し（<Rb t="前行末" r="ぜんぎょうまつ"/>の<Rb t="文字" r="もじ"/>を<Rb t="次行" r="じぎょう"/>に<Rb t="送" r="おく"/>る）</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="kinsoku" checked={settings.kinsokuMode === 'burasagari'} onChange={() => setSettings({...settings, kinsokuMode: 'burasagari'})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2">ぶら<Rb t="下" r="さ"/>がり（マス<Rb t="外" r="そと"/>に<Rb t="小" r="ちい"/>さく<Rb t="表示" r="ひょうじ"/>）</span>
                  </label>
                </div>
              </div>
              <div className="flex justify-end pt-4 border-t border-slate-100">
                <button onClick={() => setSettingsModalOpen(false)} className="px-6 pt-4 pb-2 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-700 transition-all active:scale-95 shadow-sm"><Rb t="保存" r="ほぞん"/>して<Rb t="閉" r="と"/>じる</button>
              </div>
            </div>
          </Modal>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
