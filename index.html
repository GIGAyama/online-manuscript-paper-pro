  <script>
    tailwind.config = {

                    student: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                    teacher: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c' },
                    paper: '#fdfbf7',
                    genkoLine: 'rgba(46, 125, 50, 0.4)',
                    genkoStrong: 'rgba(46, 125, 50, 0.8)'
                },

<body class="bg-slate-50 text-slate-800 font-sans h-[100dvh] flex flex-col overflow-hidden selection:bg-blue-200 selection:text-blue-900">
  <div id="root" class="h-full flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback, memo } = React;

    const TEACHER_DB_KEY = 'genko_pro_teacher_db_v3';
    const STUDENT_DB_KEY = 'genko_pro_student_db_v3';
    const CLIENT_ID_KEY = 'genko_pro_client_id_v3';
    const SETTINGS_KEY = 'genko_pro_settings_v4';
    const AUTOSAVE_KEY = 'genko_pro_autosave_v4';
    const READ_RECEIPTS_KEY = 'genko_pro_read_receipts_v4';

    const GLOBAL_STYLES = `
      @media print {
        body { background: white; margin: 0; padding: 0; }
        body > #root > div > .no-print { display: none !important; }
        body > #root > div > .print-only { display: block !important; position: absolute; left: 0; top: 0; width: 100%; background: white; z-index: 9999; }
        @page { size: A4 landscape; margin: 0; }
      }
      @media screen { .print-only { display: none !important; } }
      .vertical-rl { writing-mode: vertical-rl; text-orientation: mixed; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      
      @keyframes modalFadeIn { 0% { opacity: 0; transform: translateY(15px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
      .animate-modal { animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      
      @keyframes toastFadeIn { 0% { opacity: 0; transform: translate(-50%, 20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
      .animate-toast { animation: toastFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      
      @keyframes miniToastFadeIn { 0% { opacity: 0; transform: translateX(20px); } 100% { opacity: 1; transform: translateX(0); } }
      .animate-minitoast { animation: miniToastFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      .lined-textarea {
          background-image: linear-gradient(#f8fafc 1px, transparent 1px);
          background-size: 100% 2.2rem;
          line-height: 2.2rem;
          padding: 0.5rem 1rem;
      }
      
      .cell-highlighted { background-color: rgba(254, 240, 138, 0.6) !important; }
      
      @media print {
        .print-page { width: 297mm; height: 210mm; page-break-after: always; position: relative; box-sizing: border-box; padding: 10mm; background: white; }
        .print-layout-grid { width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 16mm 1fr; border: 2px solid #2e7d32; }
        .print-gyobi-area { border-left: 1px solid #2e7d32; border-right: 1px solid #2e7d32; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #2e7d32; }
        .gyobi-content { writing-mode: vertical-rl; display: flex; align-items: center; gap: 10mm; }
        .gyobi-mark { border: 1px solid #2e7d32; width: 6mm; height: 10mm; border-radius: 50% 50% 0 0; margin-bottom: 5mm; }
        .print-half-grid { display: flex; flex-direction: row-reverse; }
        .print-line { flex: 1; display: flex; flex-direction: column; border-left: 1px solid rgba(46,125,50,0.4); }
        .print-half-grid.right-side .print-line:first-child { border-right: none; }
        .print-half-grid.left-side .print-line:first-child { border-right: none; }
        .print-cell { flex: 1; border-bottom: 1px solid rgba(46,125,50,0.4); display: flex; align-items: center; justify-content: center; position: relative; writing-mode: vertical-rl; text-orientation: mixed; }
        .hanging-chars-print { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); white-space: nowrap; writing-mode: vertical-rl; font-size: 0.6em; margin-top: -2mm; line-height: 1; }
      }
    `;

    const Rb = ({ t, r }) => (
      <span className="relative inline-block text-center align-baseline leading-none">
        {t}
        <span className="absolute bottom-full left-1/2 -translate-x-1/2 text-[0.55em] opacity-90 pointer-events-none font-bold tracking-normal leading-none whitespace-nowrap mb-[0.15em]" style={{ letterSpacing: 'normal' }}>{r}</span>
      </span>
    );

    const analyzeEssayWithGemini = async (title, grade, content) => {
        const apiKey = localStorage.getItem('gemini_api_key');
        if (!apiKey) throw new Error('先生用設定からGemini APIキーを登録してください。');

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const systemPrompt = `あなたは日本の公立小学校で長年作文指導を行ってきたプロのベテラン教師です。
以下の基準に従って、小学生の作文に対する添削とアドバイスを行ってください。

【添削の基本方針】
1. 表記の修正（必須）: 誤字脱字、送り仮名の誤り、句読点の抜け漏れや誤用など、原稿用紙の基本的なルールや日本語の表記として絶対に守るべきルールは完璧に指摘してください。
2. 内容へのアドバイス: 内容が乏しい場合や、さらに膨らませる余地がある場合は、児童が「もっと書きたい！」と思えるような、思考を促す短くてわかりやすい質問やアドバイスを提供してください。（例: 「この時、どんな気持ちだったのかな？」「一番楽しかったのはどの部分？」）
3. 児童への配慮: 相手は小学生です。発達段階に合わせて、必要以上に厳しすぎる指摘や難しすぎる言葉は避け、温かく励ますようなトーンを心がけてください。

出力は以下のJSON配列のみとしてください。Markdownのコードブロック（\`\`\`json など）は絶対に含めないでください。
[
  {
    "quote": "指摘対象の文字列（本文からそのまま抜き出すこと。全体に対するアドバイスの場合は本文の一部を指定してください）",
    "comment": "先生からのアドバイスや修正の提案"
  }
]`;

        const userMessage = `【学年】${grade}\n【題名】${title}\n【本文】\n${content}`;
        const payload = {
            contents: [{ parts: [{ text: userMessage }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json" }
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) throw new Error('APIとの通信に失敗しました。キーが正しいか確認してください。');
        const json = await response.json();
        if (json.error) throw new Error(json.error.message);
        if (!json.candidates || json.candidates.length === 0) return [];

        return JSON.parse(json.candidates[0].content.parts[0].text);
    };

    const parseCorrectionData = (raw, fallbackText) => {
        let parsed = raw;
        while (typeof parsed === 'string') { try { parsed = JSON.parse(parsed); } catch(e) { break; } }
        if (!parsed) return { baseText: fallbackText || '', items: [] };
        if (Array.isArray(parsed)) return { baseText: fallbackText || '', items: parsed };
        if (parsed.items && Array.isArray(parsed.items)) return { baseText: parsed.baseText || fallbackText || '', items: parsed.items };
        return { baseText: fallbackText || '', items: [] };
    };

    const mapIndex = (index, diffs) => {
        if (typeof index !== 'number') return 0;
        let oldIndex = 0; let newIndex = 0;
        for (let i = 0; i < diffs.length; i++) {
            const [type, text] = diffs[i]; const len = text.length;
            if (type === 0) { if (oldIndex + len > index) return newIndex + (index - oldIndex); oldIndex += len; newIndex += len; } 
            else if (type === -1) { if (oldIndex + len > index) return newIndex; oldIndex += len; } 
            else if (type === 1) { newIndex += len; }
        }
        return newIndex;
    };

    const getAdjustedCorrections = (baseText, currentContent, items) => {
        const safeItems = Array.isArray(items) ? items : [];
        if (!baseText || safeItems.length === 0) return safeItems;
        if (typeof window.diff_match_patch !== 'function') return safeItems;
        try {
            const dmp = new window.diff_match_patch();
            const diffs = dmp.diff_main(baseText, currentContent || '');
            dmp.diff_cleanupSemantic(diffs);
            return safeItems.map(item => {
                if (typeof item.start !== 'number' || typeof item.end !== 'number') return item;
                const newStart = mapIndex(item.start, diffs);
                const newEnd = mapIndex(item.end, diffs);
                if (Number.isNaN(newStart) || Number.isNaN(newEnd)) return item; 
                return { ...item, start: newStart, end: Math.max(newStart, newEnd) };
            });
        } catch (error) { return safeItems; }
    };

    const parseGenkoPaper = (title, className, name, content, settings) => {
        const chars = settings.charsPerLine;
        const mode = settings.kinsokuMode;
        const lines = [];
        const createEmptyLine = () => Array(chars).fill({ c: '', idx: null });

        const titleParas = (title || '').split('\n');
        titleParas.forEach(p => {
            if (!p && lines.length === 0) return;
            let line = createEmptyLine();
            let cursor = 2;
            p.split('').forEach(char => {
                if (cursor >= chars) { lines.push(line); line = createEmptyLine(); cursor = 0; }
                line[cursor++] = { c: char, idx: null };
            });
            lines.push(line);
        });
        if (lines.length === 0 || title) lines.push(createEmptyLine());
        
        const footerText = `${className || ''} ${name || ''}`.trim();
        if (footerText) {
            let line = createEmptyLine();
            let start = Math.max(0, chars - footerText.length - 1);
            footerText.split('').forEach((char, i) => {
                if (start + i < chars) line[start + i] = { c: char, idx: null };
            });
            lines.push(line, createEmptyLine());
        }

        const noStart = ['、','。','」','』','）','っ','ゃ','ゅ','ょ','ッ','ャ','ュ','ョ','ー',',','.','」','』',']','}','>','ぁ','ぃ','ぅ','ぇ','ぉ','ァ','ィ','ゥ','ェ','ォ','ヮ','ヵ','ヶ','・','？','！','‼','⁇','々'];
        const noEnd = ['「', '『', '（', '(', '[', '{', '<', '【', '〔', '［'];
        const compressionPairs = ['。」', '。』', '。）', '、」', '、』', '、）', '！』', '！」', '？』', '？」'];
        
        let charGlobalIndex = 0;

        (content || '').split('\n').forEach(p => {
            if (p === '') { lines.push(createEmptyLine()); charGlobalIndex++; return; }
            let line = [];
            const pChars = p.split('');
            let i = 0;

            while (i < pChars.length) {
                let char = pChars[i];
                let charIdx = charGlobalIndex + i;
                let step = 1;

                if (i < pChars.length - 1) {
                    const pair = char + pChars[i+1];
                    if (compressionPairs.includes(pair)) { char = pair; step = 2; }
                }

                if (line.length === chars - 1) {
                    if (noEnd.includes(char.charAt(0))) {
                        lines.push(line); line = [];
                        line.push({ c: char, idx: charIdx });
                        i += step; continue;
                    }
                }

                line.push({ c: char, idx: charIdx });
                i += step;

                if (line.length >= chars) {
                    if (mode === 'oidashi') {
                        if (i < pChars.length) {
                            let nextChar = pChars[i];
                            let nextStep = 1;
                            if (i < pChars.length - 1) {
                                const nextPair = nextChar + pChars[i+1];
                                if (compressionPairs.includes(nextPair)) { nextChar = nextPair; nextStep = 2; }
                            }
                            if (noStart.includes(nextChar.charAt(0))) {
                                const kicked = line.pop();
                                lines.push(line);
                                line = [kicked];
                                continue;
                            }
                        }
                        lines.push(line); line = [];
                    } else { 
                        while (i < pChars.length) {
                            let nextChar = pChars[i];
                            let nextStep = 1;
                            if (i < pChars.length - 1) {
                                const nextPair = nextChar + pChars[i+1];
                                if (compressionPairs.includes(nextPair)) { nextChar = nextPair; nextStep = 2; }
                            }
                            if (noStart.includes(nextChar.charAt(0))) {
                                line.push({ c: nextChar, idx: charGlobalIndex + i });
                                i += nextStep;
                            } else { break; }
                        }
                        lines.push(line); line = [];
                    }
                }
            }
            if (line.length > 0) {
                while (line.length < chars) line.push({ c: '', idx: null });
                lines.push(line);
            }
            charGlobalIndex += pChars.length + 1;
        });

        if (lines.length === 0) lines.push(createEmptyLine());
        return lines;
    };

    const GenkoCell = memo(({ charObj, isLastLineChar, hangingChars, cellSize, isSelected, showCorrection, isResolved, onClickCorrection }) => {
        let bgClass = ''; let afterElement = null;
        if (showCorrection) {
            bgClass = isResolved ? 'bg-emerald-50/50 cursor-pointer hover:bg-emerald-100' : 'bg-rose-50 cursor-pointer hover:bg-rose-100';
            const color = isResolved ? 'bg-emerald-500' : 'bg-rose-500';
            afterElement = <div className={`absolute top-0 right-[2px] bottom-0 w-[3px] rounded-full ${color} pointer-events-none`}></div>;
        }

        return (
            <div className={`genko-cell vertical-rl flex items-center justify-center border-b border-genkoLine relative flex-shrink-0 ${cellSize} ${isLastLineChar ? 'border-b-0' : ''} transition-colors duration-200 ${bgClass} ${isSelected ? 'cell-highlighted' : ''}`}
                 data-idx={charObj.idx !== null ? charObj.idx : ''}
                 onClick={(e) => { if (showCorrection && onClickCorrection) { e.stopPropagation(); onClickCorrection(); } }}>
                <span>{charObj.c}</span>
                {afterElement}
                {hangingChars && (
                    <div className="absolute top-full left-1/2 -translate-x-1/2 whitespace-nowrap vertical-rl text-[0.7em] leading-none mt-1 pointer-events-none z-10 text-black">
                        {hangingChars}
                    </div>
                )}
            </div>
        );
    }, (prev, next) => {
        return prev.charObj.c === next.charObj.c && prev.charObj.idx === next.charObj.idx && prev.showCorrection === next.showCorrection && prev.isResolved === next.isResolved && prev.hangingChars === next.hangingChars && prev.cellSize === next.cellSize;
    });

    const GenkoLineComponent = memo(({ line, charsPerLine, cellSize, isFirst, isLast, safeCorrections, isTeacher, onClickCorrection }) => {
        return (
            <div className={`flex flex-col flex-shrink-0 border-l border-genkoLine ${isFirst ? 'border-r border-genkoStrong' : ''} ${isLast ? 'border-l-genkoStrong' : ''}`}>
                {Array.from({ length: charsPerLine }).map((_, j) => {
                    const charObj = line[j] || { c: '', idx: null };
                    const idx = charObj.idx;
                    let correction = null;
                    if (idx !== null && safeCorrections.length > 0) {
                        correction = safeCorrections.find(c => idx >= c.start && idx < c.end);
                    }
                    const isResolved = correction?.status === 'resolved';
                    const showCorrection = !!(correction && (isTeacher || !isResolved));
                    const isLastLineChar = j === charsPerLine - 1;
                    const hangingChars = (isLastLineChar && line.length > charsPerLine) ? line.slice(charsPerLine).map(c => c.c).join('') : null;

                    return (
                        <GenkoCell key={j} charObj={charObj} isLastLineChar={isLastLineChar} hangingChars={hangingChars} cellSize={cellSize} showCorrection={showCorrection} isResolved={isResolved} onClickCorrection={correction ? () => onClickCorrection(correction) : undefined} />
                    );
                })}
            </div>
        );
    }, (prev, next) => {
        if (prev.charsPerLine !== next.charsPerLine || prev.cellSize !== next.cellSize) return false;
        const prevLineStr = prev.line.map(c=>c.c+c.idx).join('');
        const nextLineStr = next.line.map(c=>c.c+c.idx).join('');
        if (prevLineStr !== nextLineStr) return false;
        const getLineCorrections = (line, corrections) => {
            const minIdx = line.find(c => c.idx !== null)?.idx ?? 999999;
            const maxIdx = line.slice().reverse().find(c => c.idx !== null)?.idx ?? -1;
            return corrections.filter(c => c.end > minIdx && c.start <= maxIdx).map(c=>c.id+c.status).join(',');
        };
        const prevCorStr = getLineCorrections(prev.line, prev.safeCorrections);
        const nextCorStr = getLineCorrections(next.line, next.safeCorrections);
        return prevCorStr === nextCorStr && prev.isTeacher === next.isTeacher;
    });

    const GenkoPaper = ({ draft, settings, corrections, isTeacher, onCorrectionAdded, onClickCorrection }) => {
        const lines = useMemo(() => parseGenkoPaper(draft?.title, draft?.class, draft?.name, draft?.content, settings), [draft, settings]);
        const { charsPerLine } = settings;
        const linesPerPage = charsPerLine === 20 ? 20 : 16;
        const cellSize = charsPerLine === 20 ? 'w-[2.8rem] h-[2.8rem] text-[1.6rem]' : 'w-[3.6rem] h-[3.6rem] text-[2.0rem]';
        const safeCorrections = Array.isArray(corrections) ? corrections : [];
        const pageCount = Math.ceil(lines.length / linesPerPage) || 1;
        const renderLen = pageCount * linesPerPage;

        const dragRef = useRef({ isDragging: false, startIdx: null, currentIdx: null });
        const paperRef = useRef(null);

        const updateHighlightDOM = (start, end) => {
            if (!paperRef.current) return;
            const s = Math.min(start, end);
            const e = Math.max(start, end);
            const cells = paperRef.current.querySelectorAll('.genko-cell');
            cells.forEach(cell => {
                const idxStr = cell.getAttribute('data-idx');
                if (!idxStr) return;
                const i = parseInt(idxStr, 10);
                if (i >= s && i <= e) cell.classList.add('cell-highlighted');
                else cell.classList.remove('cell-highlighted');
            });
        };

        const clearHighlightDOM = () => {
            if (!paperRef.current) return;
            paperRef.current.querySelectorAll('.genko-cell.cell-highlighted').forEach(c => c.classList.remove('cell-highlighted'));
        };

        const handleMouseDown = useCallback((e) => {
            if (!isTeacher) return;
            const cell = e.target.closest('.genko-cell');
            if (!cell) return;
            const idxStr = cell.getAttribute('data-idx');
            if (!idxStr) return;
            const idx = parseInt(idxStr, 10);
            dragRef.current = { isDragging: true, startIdx: idx, currentIdx: idx };
            updateHighlightDOM(idx, idx);
        }, [isTeacher]);

        const handleMouseMove = useCallback((e) => {
            if (!dragRef.current.isDragging) return;
            const cell = e.target.closest('.genko-cell');
            if (!cell) return;
            const idxStr = cell.getAttribute('data-idx');
            if (!idxStr) return;
            const idx = parseInt(idxStr, 10);
            if (dragRef.current.currentIdx !== idx) {
                dragRef.current.currentIdx = idx;
                updateHighlightDOM(dragRef.current.startIdx, idx);
            }
        }, []);

        const handleMouseUp = useCallback(() => {
            if (!dragRef.current.isDragging) return;
            dragRef.current.isDragging = false;
            const start = dragRef.current.startIdx;
            const end = dragRef.current.currentIdx;
            if (start !== null && end !== null && onCorrectionAdded) {
                onCorrectionAdded(Math.min(start, end), Math.max(start, end));
            }
            clearHighlightDOM();
        }, [onCorrectionAdded]);

        return (
            <div ref={paperRef} className="flex flex-row-reverse p-10 gap-8 font-genko w-max text-slate-800 select-none bg-[#fffaf0]" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
                <div className="flex flex-row-reverse border-y border-genkoStrong bg-paper shadow-sm">
                    {Array.from({ length: renderLen }).map((_, i) => (
                        <GenkoLineComponent key={i} line={lines[i] || []} charsPerLine={charsPerLine} cellSize={cellSize} isFirst={i === 0} isLast={i === renderLen - 1} safeCorrections={safeCorrections} isTeacher={isTeacher} onClickCorrection={onClickCorrection} />
                    ))}
                </div>
            </div>
        );
    };

    const DiffViewer = ({ draft, settings }) => {
        const parsedCorrections = parseCorrectionData(draft?.correction, draft?.content);
        const oldText = parsedCorrections.baseText || '';
        const newText = draft?.content || '';
        
        const charsPerLine = settings?.charsPerLine || 20;
        const viewerHeight = charsPerLine === 20 ? '700px' : '550px';
        const viewerMinWidth = charsPerLine === 20 ? '500px' : '400px';

        const getDiffElements = (oldText, newText) => {
            if (!oldText || !newText || typeof window.diff_match_patch !== 'function') {
                return (newText || '').split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>);
            }
            try {
                const dmp = new window.diff_match_patch();
                const diffs = dmp.diff_main(oldText, newText);
                dmp.diff_cleanupSemantic(diffs);
                let elements = []; let key = 0;
                diffs.forEach((diff) => {
                    const [op, text] = diff;
                    const lines = text.split('\n');
                    lines.forEach((line, index) => {
                        if (line) {

    const ScalableWrapper = ({ children, externalScrollRatio }) => {
      const wrapperRef = useRef(null);

      const contentRef = useRef(null);
      const [scale, setScale] = useState(1); const [dims, setDims] = useState({ w: 0, h: 0 });

      useEffect(() => {
        let reqId;
        const updateScale = () => {
          if (!containerRef.current || !contentRef.current) return;
          const availableH = containerRef.current.clientHeight - 40;
          const firstChild = contentRef.current.firstElementChild;
          if (!firstChild) return;
          const originalW = firstChild.offsetWidth; const originalH = firstChild.offsetHeight;

          if (originalH > 10 && availableH > 10) {
            let s = availableH / originalH;
            if (s > 1.2) s = 1.2; if (s < 0.1) s = 0.1;
            setDims(prev => (prev.w !== originalW || prev.h !== originalH) ? { w: originalW, h: originalH } : prev);
            setScale(s);
          }
        };
        const observer = new ResizeObserver(() => { reqId = requestAnimationFrame(updateScale); });
        if (containerRef.current) observer.observe(containerRef.current);
        if (contentRef.current && contentRef.current.firstElementChild) observer.observe(contentRef.current.firstElementChild);

        updateScale(); setTimeout(updateScale, 100);
        return () => { observer.disconnect(); cancelAnimationFrame(reqId); };
      }, [children]);

      useEffect(() => {
          if (externalScrollRatio !== undefined && containerRef.current && dims.w > 0) {
              const c = containerRef.current;
              const maxScroll = c.scrollWidth - c.clientWidth;
              if (maxScroll > 0) c.scrollLeft = - (maxScroll * externalScrollRatio);
          }
      }, [externalScrollRatio, dims.w, scale]);

      useEffect(() => {
        const wrapper = wrapperRef.current; const container = containerRef.current;
        if (!wrapper || !container) return;
        const handleWheel = (e) => {
          if (Math.abs(e.deltaY) > Math.abs(e.deltaX) && !e.ctrlKey && !e.shiftKey && !e.altKey) {
            e.preventDefault(); 
            if (typeof container.scrollBy === 'function') container.scrollBy({ left: -e.deltaY, behavior: 'auto' });
            else container.scrollLeft -= e.deltaY;
          }
        };
        wrapper.addEventListener('wheel', handleWheel, { passive: false });
        return () => wrapper.removeEventListener('wheel', handleWheel);
      }, []);

      return (
        <div ref={wrapperRef} className="absolute inset-0 bg-slate-100/50 overflow-hidden">
          <div ref={containerRef} className="w-full h-full overflow-auto relative hide-scrollbar p-2 sm:p-6 scroll-smooth" style={{ direction: 'rtl' }}>

    const usePeerCommunication = (updateTeacherDb, setSyncStatus, showToast, showMiniToast, setActiveDraft, mode, clientId, onSyncRequest, onReceiveReturn) => {
        const [peer, setPeer] = useState(null);
        const [peerId, setPeerId] = useState('');
        const [pinCode, setPinCode] = useState('');
        const [connections, setConnections] = useState([]);
        const [hostConn, setHostConn] = useState(null);

        const createRoom = useCallback(() => {
            const pin = Math.floor(1000 + Math.random() * 9000).toString();
            const id = `genko-pro-${pin}`;
            const newPeer = new Peer(id);
            
            newPeer.on('open', actualId => {
                setPeerId(actualId);
                setPinCode(pin);
                setSyncStatus('connected');
            });
            newPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    showToast('エラーが発生しました。もう一度ルームを作成してください。', 'error');
                    setPeerId(''); setPinCode('');
                    setSyncStatus('offline');
                }
            });
            newPeer.on('connection', conn => {
                conn.on('open', () => {
                    setConnections(prev => {
                        if (!prev.find(c => c.peer === conn.peer)) return [...prev, conn];
                        return prev;
                    });
                });
                conn.on('data', data => {
                    try {
                        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
                        if (parsed.type === 'submission') {
                            updateTeacherDb(parsed.data);
                        } else if (parsed.type === 'sync_request') {
                            if (onSyncRequest) onSyncRequest(parsed.clientId, parsed.draftsInfo, conn);
                        }
                    } catch (e) {}
                });
                conn.on('close', () => {
                    setConnections(prev => prev.filter(c => c.peer !== conn.peer));
                });
            });
            setPeer(newPeer);
        }, [updateTeacherDb, setSyncStatus, showToast, onSyncRequest]);

        const connectToHost = useCallback((pin, currentDraftsInfo) => {
            setSyncStatus('connecting');
            const newPeer = new Peer();
            newPeer.on('open', (id) => {
                setPeerId(id);
                const hostId = `genko-pro-${pin}`;
                const conn = newPeer.connect(hostId, { reliable: true });
                
                conn.on('open', () => {
                    setHostConn(conn);
                    setSyncStatus('connected');
                    conn.send({ type: 'sync_request', clientId: clientId, draftsInfo: currentDraftsInfo });
                });
                conn.on('data', data => {
                    try {
                        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
                        if (parsed.type === 'return') {
                            if (onReceiveReturn) onReceiveReturn(parsed.data);
                        }
                    } catch (e) {}
                });
                conn.on('close', () => {
                    setHostConn(null);
                    setSyncStatus('offline');
                });
            });
            newPeer.on('error', (err) => {
                setSyncStatus('offline');
                if (err.type === 'peer-unavailable') {
                    showToast('せんせいが みつかりません。PINを かくにん してください。', 'error');
                } else {
                    showToast('せつぞくエラーが はっせい しました。', 'error');
                }
            });
            setPeer(newPeer);
        }, [setSyncStatus, showToast, clientId, onReceiveReturn]);

        const sendToHost = useCallback((data) => {
            if (hostConn && hostConn.open) {
                const dataWithPeerId = { ...data };
                if (dataWithPeerId.data) {
                    dataWithPeerId.data.peerId = peerId;
                    dataWithPeerId.data.clientId = clientId;
                }
                hostConn.send(dataWithPeerId);
                return true;
            }
            return false;
        }, [hostConn, peerId, clientId]);

        const sendToClient = useCallback((clientPeerId, data) => {
            const conn = connections.find(c => c.peer === clientPeerId);
            if (conn && conn.open) {
                conn.send(data);
                return true;
            }
            return false;
        }, [connections]);

        return { peerId, pinCode, connections, hostConn, createRoom, connectToHost, sendToHost, sendToClient };
    };

                <div className="contents lg:flex lg:flex-col lg:w-1/3 lg:min-w-[320px] lg:max-w-[450px] lg:bg-white lg:rounded-2xl lg:shadow-sm lg:border lg:border-slate-200 lg:overflow-hidden lg:ring-1 lg:ring-slate-900/5 lg:h-full">
                    <div className="order-1 lg:order-none flex-1 overflow-visible lg:overflow-auto p-4 sm:p-5 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 ring-1 ring-slate-900/5 lg:bg-transparent lg:rounded-none lg:shadow-none lg:border-none lg:ring-0 shrink-0 lg:shrink min-h-[300px] lg:min-h-0">
                        <div className="flex justify-between items-center mb-3 sm:mb-4 shrink-0">
                            <div className="flex items-center gap-2 sm:gap-3">
                                <span className="text-xs sm:text-sm font-bold text-slate-500 pt-1 sm:pt-2 leading-loose"><Rb t="基本情報" r="きほんじょうほう"/></span>
                                {isLocked && (
                                    <span className={`px-2 py-1 sm:px-2.5 sm:py-1.5 rounded text-[10px] sm:text-xs font-bold shadow-sm flex items-center gap-1 mt-1 ${isCompleted ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-blue-100 text-blue-700 border border-blue-200'}`}>
                                        <i className="bi bi-lock-fill -mt-0.5"></i> <span className="leading-relaxed">{isCompleted ? <><Rb t="完了" r="かんりょう"/>のため<Rb t="編集不可" r="へんしゅうふか"/></> : <><Rb t="提出済" r="ていしゅつずみ"/>のため<Rb t="編集不可" r="へんしゅうふか"/></>}</span>
                                    </span>
                                )}
                                {!isLocked && hasDiff && (
                                    <span className="px-2 py-1 sm:px-2.5 sm:py-1.5 rounded text-[10px] sm:text-xs font-bold bg-blue-50 text-blue-700 shadow-sm border border-blue-200 flex items-center gap-1 mt-1">
                                        <i className="bi bi-info-circle -mt-0.5"></i> <span className="leading-relaxed"><Rb t="前回" r="ぜんかい"/>からの<Rb t="変更" r="へんこう"/>あり</span>
                                    </span>
                                )}
                            </div>
                            <span className={`pt-1 sm:pt-2 pb-0.5 sm:pb-1 px-2 sm:px-3 rounded-full text-[10px] sm:text-xs font-bold text-white shadow-sm leading-loose ${localDraft.status==='submitted'?'bg-blue-500':localDraft.status==='completed'?'bg-emerald-500':localDraft.status==='rework'?'bg-amber-500':'bg-slate-400'}`}>
                                {localDraft.status==='submitted' ? <Rb t="提出済" r="ていしゅつずみ"/> : localDraft.status==='completed' ? <Rb t="完了" r="かんりょう"/> : localDraft.status==='rework' ? <Rb t="再提出" r="さいていしゅつ"/> : <><Rb t="下書" r="したが"/>き</>}
                            </span>
                        </div>
                        
                        <input type="text" readOnly={isLocked} placeholder="題名" value={localDraft.title} onChange={e=>setLocalDraft(prev=>({...prev, title:e.target.value}))} className={`shrink-0 w-full px-3 py-2 sm:px-4 sm:py-3 mb-2 sm:mb-3 border border-slate-200 rounded-xl outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 font-bold text-base sm:text-lg transition-all ${isLocked ? 'bg-slate-100 text-slate-500 cursor-not-allowed' : 'bg-slate-50/50 hover:bg-slate-50 focus:bg-white text-slate-800'}`} />
                        <div className="flex gap-2 sm:gap-3 mb-3 sm:mb-4 shrink-0">
                            <input type="text" readOnly={isLocked} placeholder="学年・クラス" value={localDraft.class} onChange={e=>setLocalDraft(prev=>({...prev, class:e.target.value}))} className={`w-1/3 px-3 py-1.5 sm:px-4 sm:py-2 border border-slate-200 rounded-xl outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all text-sm sm:text-base ${isLocked ? 'bg-slate-100 text-slate-500 cursor-not-allowed' : 'bg-slate-50/50 hover:bg-slate-50 focus:bg-white text-slate-800'}`} />
                            <input type="text" readOnly={isLocked} placeholder="名前" value={localDraft.name} onChange={e=>setLocalDraft(prev=>({...prev, name:e.target.value}))} className={`flex-1 px-3 py-1.5 sm:px-4 sm:py-2 border border-slate-200 rounded-xl outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all text-sm sm:text-base ${isLocked ? 'bg-slate-100 text-slate-500 cursor-not-allowed' : 'bg-slate-50/50 hover:bg-slate-50 focus:bg-white text-slate-800'}`} />
                        </div>

                        <textarea onScroll={handleEditorScroll} readOnly={isLocked} placeholder="ここに作文を書いてください..." value={localDraft.content} onChange={e=>setLocalDraft(prev=>({...prev, content:e.target.value}))} className={`flex-1 min-h-[150px] sm:min-h-[250px] w-full p-4 sm:p-5 border border-slate-200 rounded-xl outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 resize-none leading-loose text-base sm:text-lg mb-2 shadow-inner transition-all hide-scrollbar lined-textarea ${isLocked ? 'bg-slate-100 text-slate-500 cursor-not-allowed' : 'bg-blue-50/20 hover:bg-blue-50/40 focus:bg-white text-slate-800'}`} />
                        <div className="text-right text-xs sm:text-sm text-slate-500 font-bold pt-1 sm:pt-2 leading-loose shrink-0">
                            {(localDraft.content || '').replace(/\n/g, '').length} <Rb t="文字" r="もじ"/>
                        </div>
                    </div>

                    <div className="order-3 lg:order-none p-3 sm:p-4 bg-slate-50 grid grid-cols-2 gap-2 sm:gap-3 shrink-0 rounded-2xl shadow-sm border border-slate-200 ring-1 ring-slate-900/5 lg:rounded-none lg:shadow-none lg:border-x-0 lg:border-b-0 lg:border-t lg:border-slate-100 lg:ring-0">
                        <button onClick={onNew} className="flex items-center justify-center gap-1 sm:gap-2 pt-3 pb-2 sm:pt-4 sm:pb-2.5 border border-slate-200 rounded-xl bg-white hover:bg-slate-50 font-bold text-slate-700 transition-all active:scale-95 leading-loose shadow-sm text-sm sm:text-base"><i className="bi bi-plus-lg text-[16px] sm:text-[18px]"></i> <span><Rb t="新規" r="しんき"/></span></button>
                        <button onClick={() => setLoadModalOpen(true)} className="flex items-center justify-center gap-1 sm:gap-2 pt-3 pb-2 sm:pt-4 sm:pb-2.5 border border-blue-200 rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold transition-all active:scale-95 leading-loose shadow-sm text-sm sm:text-base"><i className="bi bi-folder2-open text-[16px] sm:text-[18px]"></i> <span><Rb t="開" r="ひら"/>く</span></button>
                        
                        {isCompleted ? (
                            <button onClick={() => setIsDuplicateConfirmOpen(true)} className="col-span-2 flex items-center justify-center gap-1 sm:gap-2 pt-3 pb-2 sm:pt-4 sm:pb-3 bg-emerald-500 text-white rounded-xl font-bold hover:bg-emerald-600 hover:shadow-lg transition-all active:scale-95 shadow-md leading-loose text-sm sm:text-base"><i className="bi bi-files text-[16px] sm:text-[18px]"></i> <span>コピーして<Rb t="新" r="あたら"/>しく<Rb t="書" r="か"/>く</span></button>
                        ) : isSubmitted ? (
                            <button disabled className="col-span-2 flex items-center justify-center gap-1 sm:gap-2 pt-3 pb-2 sm:pt-4 sm:pb-3 bg-slate-300 text-white rounded-xl font-bold leading-loose cursor-not-allowed text-sm sm:text-base"><i className="bi bi-send-check text-[16px] sm:text-[18px]"></i> <span><Rb t="提出済" r="ていしゅつずみ"/>（<Rb t="先生" r="せんせい"/>の<Rb t="確認待" r="かくにんま"/>ち）</span></button>
                        ) : (
                            <>
                                <div className="flex gap-1 col-span-1">
                                    <button onClick={() => onSave(false, false, localDraft)} className="flex-1 flex items-center justify-center gap-1 sm:gap-2 pt-3 pb-2 sm:pt-4 sm:pb-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 hover:shadow-lg transition-all active:scale-95 shadow-md leading-loose text-sm sm:text-base"><i className="bi bi-floppy text-[16px] sm:text-[18px]"></i> <span><Rb t="保存" r="ほぞん"/></span></button>
                                    <button onClick={handleExportFile} className="px-2 sm:px-3 pt-3 pb-2 sm:pt-4 sm:pb-3 bg-white border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-100 transition-all active:scale-95 shadow-sm" title="ファイルに書き出す"><i className="bi bi-download"></i></button>
                                </div>
                                <button onClick={async () => {
                                    const confirmResult = await Swal.fire({
                                        title: 'ていしゅつ しますか？',
                                        text: 'せんせいに そうしん します。かくにん されるまで なおせなくなります。',
                                        icon: 'question',
                                        showCancelButton: true,
                                        confirmButtonColor: '#2563eb',
                                        cancelButtonColor: '#94a3b8',
                                        confirmButtonText: 'はい、ていしゅつします',
                                        cancelButtonText: 'キャンセル'
                                    });
                                    if (confirmResult.isConfirmed) onSave(true, false, localDraft);
                                }} className="flex items-center justify-center gap-1 sm:gap-2 pt-3 pb-2 sm:pt-4 sm:pb-3 bg-gradient-to-r from-blue-500 to-blue-400 text-white rounded-xl font-bold hover:from-blue-600 hover:to-blue-500 hover:shadow-lg transition-all active:scale-95 shadow-md leading-loose text-sm sm:text-base"><i className="bi bi-send text-[16px] sm:text-[18px]"></i> <span><Rb t="提出" r="ていしゅつ"/></span></button>
                            </>
                        )}
                    </div>
                </div>

                <div className="order-2 lg:order-none w-full lg:flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative min-w-0 ring-1 ring-slate-900/5 h-[50vh] lg:h-full shrink-0 lg:shrink">
                    <div className="absolute top-2 right-2 sm:top-4 sm:right-4 z-20">
                        <button onClick={() => window.print()} className="px-2 pt-2 pb-1 sm:px-3 sm:pt-3 sm:pb-1.5 rounded-lg bg-white shadow-sm border border-slate-200 text-xs sm:text-sm font-bold text-emerald-600 hover:bg-emerald-50 transition-all active:scale-95 flex items-center gap-1 leading-loose"><i className="bi bi-printer text-[14px] sm:text-[15px] -mt-1"></i><span className="hidden sm:inline"><Rb t="印刷" r="いんさつ"/></span></button>
                    </div>
                    <div className="flex-1 relative min-h-0 bg-slate-100/30 rounded-2xl">
                        <ScalableWrapper key={`${draft?.id || 'new'}-${settings.charsPerLine}-${settings.kinsokuMode}`} externalScrollRatio={scrollRatio}>
                            <GenkoPaper draft={draft} settings={settings} corrections={adjustedCorrections} isTeacher={false} onClickCorrection={(cor) => setSelectedCor(cor)} />
                        </ScalableWrapper>
                    </div>
                </div>

                <Modal isOpen={isDuplicateConfirmOpen} onClose={() => setIsDuplicateConfirmOpen(false)} title={<><Rb t="作品" r="さくひん"/>のコピー</>} maxWidth="max-w-md">
                    <div className="space-y-4">
                        <p className="text-slate-700 font-bold leading-[2.5] pt-2">
                            この<Rb t="作品" r="さくひん"/>は「<Rb t="完了" r="かんりょう"/>」しているため、そのまま<Rb t="編集" r="へんしゅう"/>することはできません。<br/><br/>
                            コピーして、<Rb t="新" r="あたら"/>しい<Rb t="作品" r="さくひん"/>として<Rb t="書" r="か"/>き<Rb t="直" r="なお"/>しますか？
                        </p>
                        <div className="flex gap-3 pt-4 border-t border-slate-100">
                            <button onClick={() => setIsDuplicateConfirmOpen(false)} className="flex-1 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 transition-all active:scale-95">キャンセル</button>
                            <button onClick={executeDuplicate} className="flex-1 py-3 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition-all active:scale-95 shadow-sm">コピーする</button>
                        </div>
                    </div>
                </Modal>

                <Modal isOpen={!!selectedCor} onClose={() => setSelectedCor(null)} title={<><Rb t="先生" r="せんせい"/>からのコメント</>} maxWidth="max-w-md">
                    {selectedCor && (
                        <div className="space-y-4">
                            <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl text-slate-800 font-medium leading-relaxed">
                                {selectedCor.comment.replace('【AI】', '')}
                            </div>
                            {isLocked ? (
                                <button disabled className="w-full pt-5 pb-3 leading-loose bg-slate-300 text-white font-bold rounded-xl cursor-not-allowed"><Rb t="提出中" r="ていしゅつちゅう"/>のため<Rb t="変更不可" r="へんこうふか"/></button>
                            ) : (
                                <button onClick={handleResolveCorrection} className="w-full pt-5 pb-3 leading-loose bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition-all active:scale-95 shadow-sm"><Rb t="修正完了" r="しゅうせいかんりょう"/>（<Rb t="赤線" r="あかせん"/>を<Rb t="消" r="け"/>す）</button>
                            )}
                        </div>
                    )}
                </Modal>
            </div>
        );
    };

    // 🌟 TeacherViewのスマホ向け完全最適化
    const TeacherView = ({ db, setDb, settings, updateStatus, updateDraftInDB, selectedId, setSelectedId, setGlobalPrintDrafts, showLoading, hideLoading, showToast, showMiniToast, peerId, pinCode, connections, createRoom, sendToClient }) => {
        const [checkedIds, setCheckedIds] = useState(new Set());
        const drafts = db.filter(d => d.status !== 'draft');
        
        const [searchQuery, setSearchQuery] = useState('');
        const [filterStatus, setFilterStatus] = useState('active');
        const [filterStartDate, setFilterStartDate] = useState('');
        const [filterEndDate, setFilterEndDate] = useState('');
        const [previewMode, setPreviewMode] = useState('genko');
        
        // 📱 スマホ表示時にリストとプレビューを切り替えるステート
        const [isMobileListOpen, setIsMobileListOpen] = useState(true);

        const filteredDrafts = useMemo(() => {
            return drafts.filter(d => {
                if (filterStatus === 'active' && d.status === 'completed') return false;
                if (filterStatus !== 'all' && filterStatus !== 'active' && d.status !== filterStatus) return false;
                if (filterStartDate || filterEndDate) {
                    const itemDate = d.updatedAt ? d.updatedAt.split(' ')[0] : '';
                    if (filterStartDate && itemDate < filterStartDate.replace(/-/g, '/')) return false;
                    if (filterEndDate && itemDate > filterEndDate.replace(/-/g, '/')) return false;
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    if (!(d.title?.toLowerCase().includes(q) || d.name?.toLowerCase().includes(q) || d.content?.toLowerCase().includes(q))) return false;
                }
                return true;
            })
            .sort((a, b) => (b.updatedTimestamp || 0) - (a.updatedTimestamp || 0));
        }, [drafts, filterStatus, filterStartDate, filterEndDate, searchQuery]);

        useEffect(() => {
            if (filteredDrafts.length > 0) {
                if (!selectedId || !filteredDrafts.find(d => d.id === selectedId)) setSelectedId(filteredDrafts[0].id);
            } else if (selectedId) setSelectedId(null);
        }, [filteredDrafts, selectedId, setSelectedId]);

        useEffect(() => {
            if (selectedId) {
                const d = db.find(x => x.id === selectedId);
                if (d) {
                    const pc = parseCorrectionData(d.correction, d.content);
                    if (pc.baseText && pc.baseText !== d.content) setPreviewMode('diff');
                    else setPreviewMode('genko');
                }
            }
        }, [selectedId, db]);

        const selectedDraft = db.find(d => d.id === selectedId);
        const [correctionModal, setCorrectionModal] = useState({ isOpen: false, text: '', start: null, end: null });
        const [deleteConfirmInfo, setDeleteConfirmInfo] = useState(null);
        const [isShortcutModalOpen, setIsShortcutModalOpen] = useState(false);

        useEffect(() => {
            const handleKeyDown = (e) => {
                if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName) || e.target.isContentEditable) return;
                if (e.key === '?') { setIsShortcutModalOpen(prev => !prev); return; }
                if (e.key === 'Escape') {
                    setIsShortcutModalOpen(false); setCorrectionModal({ isOpen: false, text: '', start: null, end: null }); setDeleteConfirmInfo(null); return; 
                }

                const key = e.key.toLowerCase();
                if (key === 's' && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); toggleAll(); return; }
                if (key === 'p' && e.shiftKey) { e.preventDefault(); handleBulkPrint(); return; }
                if (key === 'a' && e.shiftKey) { e.preventDefault(); handleBulkAiCorrection(); return; }

                if (!selectedDraft) return;
                
                const currentIndex = filteredDrafts.findIndex(d => d.id === selectedDraft.id);
                switch(key) {
                    case 'arrowup': e.preventDefault(); if (currentIndex > 0) setSelectedId(filteredDrafts[currentIndex - 1].id); break;
                    case 'arrowdown': e.preventDefault(); if (currentIndex < filteredDrafts.length - 1) setSelectedId(filteredDrafts[currentIndex + 1].id); break;
                    case 'c': e.preventDefault(); updateStatus(selectedDraft.id, 'completed'); break;
                    case 'r': e.preventDefault(); updateStatus(selectedDraft.id, 'rework'); break;
                    case 'v': e.preventDefault(); setPreviewMode(prev => prev === 'genko' ? 'diff' : 'genko'); break;
                    case 'a': if (!e.shiftKey) { e.preventDefault(); handleAiCorrection(); } break;
                    case 'p': if (!e.shiftKey) { e.preventDefault(); setGlobalPrintDrafts([selectedDraft]); setTimeout(()=>window.print(), 500); } break;
                }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [selectedDraft, filteredDrafts, checkedIds, previewMode]);

        const toggleCheck = (e, id) => {
            e.stopPropagation();
            const newSet = new Set(checkedIds);
            if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
            setCheckedIds(newSet);
        };

        const visibleIds = filteredDrafts.map(d => d.id);
        const allVisibleChecked = visibleIds.length > 0 && visibleIds.every(id => checkedIds.has(id));
        const toggleAll = () => {
            const newSet = new Set(checkedIds);
            if (allVisibleChecked) visibleIds.forEach(id => newSet.delete(id)); else visibleIds.forEach(id => newSet.add(id));
            setCheckedIds(newSet);
        };

        const handleCorrectionAdded = (start, end) => {
            setCorrectionModal({ isOpen: true, text: '', start, end });
        };

        const handleSaveCorrection = () => {
            if (!selectedDraft || !correctionModal.text) return;
            const { start, end } = correctionModal;
            const displayStart = start;
            const displayEnd = end + 1;
            const currentContent = selectedDraft.content || '';
            let parsedCorrections = parseCorrectionData(selectedDraft.correction, currentContent);
            const currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
            const originalText = currentContent.substring(displayStart, displayEnd);
            currentItems.push({ id: crypto.randomUUID(), start: displayStart, end: displayEnd, comment: correctionModal.text, originalText, status: 'active' });
            
            const updatedDraft = { ...selectedDraft, correction: JSON.stringify({ baseText: currentContent, items: currentItems }), updatedTimestamp: Date.now() };
            
            updateDraftInDB(updatedDraft);
            setCorrectionModal({ isOpen: false, text: '', start:null, end:null });
            showMiniToast('添削を保存しました', 'success');

            if (updatedDraft.peerId) {
                sendToClient(updatedDraft.peerId, { type: 'return', data: updatedDraft });
            }
        };

        const executeDeleteCorrection = () => {
            if (!deleteConfirmInfo) return;
            const currentContent = selectedDraft.content || '';
            let parsedCorrections = parseCorrectionData(selectedDraft.correction, currentContent);
            let currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
            const newItems = currentItems.filter(c => c.id !== deleteConfirmInfo.id);
            
            const updatedDraft = { ...selectedDraft, correction: JSON.stringify({ baseText: currentContent, items: newItems }), updatedTimestamp: Date.now() };
            
            updateDraftInDB(updatedDraft);
            setDeleteConfirmInfo(null);
            showMiniToast('添削を削除しました', 'success');
            
            if (updatedDraft.peerId) sendToClient(updatedDraft.peerId, { type: 'return', data: updatedDraft });
        };

        const handleAiCorrection = async () => {
            if (!selectedDraft) return;
            showLoading('AIが添削中...');
            try {
                const resultItems = await analyzeEssayWithGemini(selectedDraft.title, selectedDraft.class, selectedDraft.content);
                if (!resultItems || resultItems.length === 0) { showToast('修正提案はありませんでした', 'success'); return; }
                
                const currentContent = selectedDraft.content || '';
                let parsedCorrections = parseCorrectionData(selectedDraft.correction, currentContent);
                let currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
                let addedCount = 0;
                
                (Array.isArray(resultItems) ? resultItems : []).forEach(aiItem => {
                    const idx = currentContent.indexOf(aiItem.quote);
                    if (idx !== -1) { currentItems.push({ id: crypto.randomUUID(), start: idx, end: idx + aiItem.quote.length, comment: '【AI】' + aiItem.comment, originalText: aiItem.quote, status: 'active' }); addedCount++; }
                });
                
                const updatedDraft = { ...selectedDraft, correction: JSON.stringify({ baseText: currentContent, items: currentItems }), updatedTimestamp: Date.now() };
                
                updateDraftInDB(updatedDraft);
                showToast(`${addedCount}件のAI提案を追加しました`, 'success');
                if (updatedDraft.peerId) sendToClient(updatedDraft.peerId, { type: 'return', data: updatedDraft });
            } catch(e) { showToast(e.message, 'error'); } finally { hideLoading(); }
        };

        const handleBulkAiCorrection = async () => {
            if (checkedIds.size === 0) return showToast('一括添削する作品にチェックを入れてください', 'error');
            
            const confirmResult = await Swal.fire({
                title: '一括AI添削の実行',
                text: `選択した ${checkedIds.size} 件の作品にAI添削を実行しますか？`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f59e0b',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: '実行する',
                cancelButtonText: 'キャンセル'
            });
            if (!confirmResult.isConfirmed) return;

            showLoading(`一括AI添削中... (0/${checkedIds.size})`);
            let successCount = 0; let total = checkedIds.size; let i = 0;
            for (let id of checkedIds) {
                i++; const d = drafts.find(x => x.id === id);
                if (d) {
                    showLoading(`一括AI添削中... (${i}/${total})\n${d.name}`);
                    try {
                        const resultItems = await analyzeEssayWithGemini(d.title, d.class, d.content);
                        if (resultItems && resultItems.length > 0) {
                            const currentContent = d.content || '';
                            let parsedCorrections = parseCorrectionData(d.correction, currentContent);
                            let currentItems = getAdjustedCorrections(parsedCorrections.baseText, currentContent, parsedCorrections.items);
                            (Array.isArray(resultItems) ? resultItems : []).forEach(aiItem => {
                                const idx = currentContent.indexOf(aiItem.quote);
                                if (idx !== -1) { currentItems.push({ id: crypto.randomUUID(), start: idx, end: idx + aiItem.quote.length, comment: '【AI】' + aiItem.comment, originalText: aiItem.quote, status: 'active' }); }
                            });
                            const updatedDraft = { ...d, correction: JSON.stringify({ baseText: currentContent, items: currentItems }), updatedTimestamp: Date.now() };
                            
                            updateDraftInDB(updatedDraft);
                            if (updatedDraft.peerId) sendToClient(updatedDraft.peerId, { type: 'return', data: updatedDraft });
                        }
                        successCount++;
                    } catch(e){}
                }
            }
            hideLoading(); showToast(`${successCount} 件のAI添削が完了しました`, 'success');
        };

                cancelButtonText: 'キャンセル'

            Array.from(checkedIds).forEach(id => {
                const d = drafts.find(x => x.id === id);
                if (d) {
                    const newD = { ...d, status: 'completed', updatedTimestamp: Date.now() };
                    updateDraftInDB(newD);
                    if (newD.peerId) sendToClient(newD.peerId, { type: 'return', data: newD });

            setCheckedIds(new Set());
            showMiniToast(`一括で完了にしました`, 'success');

            if (checkedIds.size === 0) return showToast('印刷する作品を選択してください', 'error');

            if (!selectedDraft) return;

            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedDraft.name || '無題'}_添削済.json`;

            const parsed = parseCorrectionData(selectedDraft.correction, selectedDraft.content);

                                    <div className="w-px h-4 lg:h-6 bg-slate-200 mx-0.5 lg:mx-1"></div>
                                    <button onClick={() => updateStatus(selectedDraft.id, 'rework')} className="px-2 lg:px-4 py-1 lg:py-1.5 rounded-full text-xs lg:text-sm font-bold border border-rose-500 text-rose-500 hover:bg-rose-50 hover:shadow-sm transition-all active:scale-95 flex items-center gap-1" title="再提出にする (R)">

                                <ScalableWrapper key={`${selectedDraft.id}-${previewMode}-${settings.charsPerLine}-${settings.kinsokuMode}`}>
