                    <div>
                        <h4 className="font-bold text-slate-700 mb-2">Gemini APIキー (AI添削用)</h4>
                        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="AI添削を使用する場合に入力" className="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition-all" />
                    </div>
                    <div className="pt-4 border-t border-slate-100">
                        <h4 className="font-bold text-slate-700 mb-2">データの管理</h4>
                        <button onClick={handleClearData} disabled={db.length === 0} className="w-full py-2 border-2 border-rose-500 text-rose-600 font-bold rounded-lg hover:bg-rose-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">全データを消去する</button>
                    </div>
                    <div className="flex justify-end pt-2 border-t border-slate-100 mt-6">
                        <button onClick={handleSave} className="px-6 py-2 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-700 transition-all active:scale-95 shadow-sm">保存して閉じる</button>
                    </div>
                </div>
            </Modal>
        );
    };

    function App() {
      const [mode, setMode] = useState('student'); 
      const [syncStatus, setSyncStatus] = useState('offline'); 
      
      const [db, setDb] = useState(() => {
          try { return JSON.parse(localStorage.getItem(TEACHER_DB_KEY) || '[]'); } catch(e) { return []; }
      });
      const [studentDb, setStudentDb] = useState(() => {
          try { return JSON.parse(localStorage.getItem(STUDENT_DB_KEY) || '[]'); } catch(e) { return []; }
      });
      
      const [clientId] = useState(() => {
          let id = localStorage.getItem(CLIENT_ID_KEY);
          if (!id) { id = crypto.randomUUID(); localStorage.setItem(CLIENT_ID_KEY, id); }
          return id;
      });

      const [activeDraft, setActiveDraft] = useState(() => {
        const saved = localStorage.getItem(AUTOSAVE_KEY);
        if (saved) { try { return JSON.parse(saved); } catch(e) {} }
        return { id: crypto.randomUUID(), title: '', class: '', name: '', content: '', status: 'draft', correction: '' };
      });
      const [teacherSelectedId, setTeacherSelectedId] = useState(null);
      const [globalPrintDrafts, setGlobalPrintDrafts] = useState([]); 
      
      const [loading, setLoading] = useState({ isVisible: false, text: '' });
      const [toast, setToast] = useState({ isVisible: false, message: '', type: 'success' });
      const [miniToast, setMiniToast] = useState({ isVisible: false, message: '', type: 'success' });
      
      const [isLoadModalOpen, setLoadModalOpen] = useState(false);
      const [isSettingsModalOpen, setSettingsModalOpen] = useState(false);
      const [isTeacherSettingsModalOpen, setIsTeacherSettingsModalOpen] = useState(false);
      const [isTeacherAuthModalOpen, setTeacherAuthModalOpen] = useState(false);
      const [isNewConfirmOpen, setIsNewConfirmOpen] = useState(false);
      const [isConnectModalOpen, setIsConnectModalOpen] = useState(false);
      
      const [readReceipts, setReadReceipts] = useState(() => {
          try { return JSON.parse(localStorage.getItem(READ_RECEIPTS_KEY) || '{}'); } catch(e) { return {}; }
      });
      const [returnedDrafts, setReturnedDrafts] = useState([]);
      const [isNotificationModalOpen, setNotificationModalOpen] = useState(false);

      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem(SETTINGS_KEY);
        if (saved) return JSON.parse(saved);
        return { charsPerLine: 20, kinsokuMode: 'oidashi' };
      });

      useEffect(() => { localStorage.setItem(TEACHER_DB_KEY, JSON.stringify(db)); }, [db]);
      useEffect(() => { localStorage.setItem(STUDENT_DB_KEY, JSON.stringify(studentDb)); }, [studentDb]);
      useEffect(() => { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }, [settings]);
      useEffect(() => { localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(activeDraft)); }, [activeDraft]);
      useEffect(() => { if (mode === 'student') setGlobalPrintDrafts([activeDraft]); }, [mode, activeDraft]);

      useEffect(() => {
          if (syncStatus === 'saving') {
              const timer = setTimeout(() => setSyncStatus('saved'), 800);
              return () => clearTimeout(timer);
          }
      }, [syncStatus]);

      const showToast = useCallback((message, type = 'success') => setToast({ isVisible: true, message, type }), []);
      const showMiniToast = useCallback((message, type = 'success') => setMiniToast({ isVisible: true, message, type }), []);
      const showLoading = useCallback((text) => setLoading({ isVisible: true, text }), []);
      const hideLoading = useCallback(() => setLoading({ isVisible: false, text: '' }), []);

      const updateDraftInDB = useCallback((updatedDraft) => {
          setDb(prev => {
              const exists = prev.find(d => d.id === updatedDraft.id);
              if (exists) return prev.map(d => d.id === updatedDraft.id ? updatedDraft : d);
              return [updatedDraft, ...prev];
          });
      }, []);

      const updateStudentDb = useCallback((draft) => {
          setStudentDb(prev => {
              const exists = prev.find(d => d.id === draft.id);
              if (exists) return prev.map(d => d.id === draft.id ? draft : d);
              return [draft, ...prev];
          });
      }, []);

      const handleSyncRequest = useCallback((clientUUID, draftsInfo, conn) => {
          const myDrafts = db.filter(d => d.clientId === clientUUID);
          let syncCount = 0;
          myDrafts.forEach(md => {
              const clientTs = draftsInfo[md.id] || 0;
              if ((md.updatedTimestamp || 0) > clientTs && ['rework', 'completed', 'returned'].includes(md.status)) {
                  conn.send({ type: 'return', data: md });
                  syncCount++;
              }
          });
          if (syncCount > 0) showMiniToast(`${syncCount}件の最新データを児童に自動返却しました`, 'success');
      }, [db, showMiniToast]);

      const handleReceiveReturn = useCallback((draft) => {
          updateStudentDb(draft);
          if (activeDraft.id === draft.id) setActiveDraft(draft);
          setReturnedDrafts(prev => {
              const exists = prev.find(d => d.id === draft.id);
              if (exists) return prev.map(d => d.id === draft.id ? draft : d);
              return [draft, ...prev];
          });
          showToast('せんせいから てんさくが へんきゃく されました！', 'success');
      }, [activeDraft.id, updateStudentDb, showToast]);

      const { peerId, pinCode, connections, hostConn, createRoom, connectToHost, sendToHost, sendToClient } = usePeerCommunication(
          updateDraftInDB, setSyncStatus, showToast, showMiniToast, setActiveDraft, mode, clientId, handleSyncRequest, handleReceiveReturn
      );

      const handleConnectWithPin = (pin) => {
          const draftsInfo = studentDb.reduce((acc, d) => { acc[d.id] = d.updatedTimestamp || 0; return acc; }, {});
          connectToHost(pin, draftsInfo);
      };

      const unreadCount = useMemo(() => returnedDrafts.filter(d => readReceipts[d.id] !== d.updatedAt).length, [returnedDrafts, readReceipts]);

      const handleSwitchMode = async (newMode) => {
        if (newMode === 'teacher') {
          const savedPass = localStorage.getItem('teacher_password');
          if (!savedPass) {
              setMode('teacher'); 
              showToast('先生モードに切り替えました。設定からパスワードを設定できます。', 'success');
          } else {
              setTeacherAuthModalOpen(true);
          }
        } else { setMode(newMode); }
      };

      const handleTeacherAuth = (pass) => {
        const savedPass = localStorage.getItem('teacher_password');
        if (pass === savedPass) {
            setTeacherAuthModalOpen(false); 
            setMode('teacher'); 
            showToast('ログインしました', 'success');
        } else {
            showToast('パスワードが間違っています', 'error');
        }
      };

      const handleSaveDraft = (isSubmit = false, isBackground = false, specificDraft = null) => {
        const targetDraft = specificDraft || activeDraft;
        const now = new Date();
        const draftToSend = { 
            ...targetDraft, 
            status: isSubmit ? 'submitted' : targetDraft.status, 
            updatedAt: now.toLocaleString('ja-JP'),
            updatedTimestamp: now.getTime(),
            clientId: clientId 
        };
        
        updateStudentDb(draftToSend);
        if (!specificDraft) setActiveDraft(draftToSend);

        const p2pSent = sendToHost({ type: 'submission', data: draftToSend });

        if (!isBackground) {
            if (isSubmit) {
                if (p2pSent) showToast('せんせいに ていしゅつ しました！', 'success');
                else showToast('せんせいと せつぞく されていないため ていしゅつ できません', 'error');
            } else {
                showToast(p2pSent ? 'せんせいと どうきし、たんまつにも ほぞん しました' : 'たんまつに ほぞん しました', 'success');
            }
        }
      };

      const updateTeacherStatus = (id, newStatus) => {
        const targetDraft = db.find(d => d.id === id); if (!targetDraft) return;
        const dataToSave = { ...targetDraft, status: newStatus, updatedTimestamp: Date.now() };
        updateDraftInDB(dataToSave);
        showMiniToast(`ステータスを「${newStatus === 'completed' ? '完了' : '再提出'}」にしました`);
        if (dataToSave.peerId) sendToClient(dataToSave.peerId, { type: 'return', data: dataToSave });
      };

      const handleNewDraft = () => {
        if (activeDraft.content || activeDraft.title) setIsNewConfirmOpen(true);
        else executeNewDraft();
      };

      const executeNewDraft = () => {
        setActiveDraft({ id: crypto.randomUUID(), title: '', class: '', name: '', content: '', status: 'draft', correction: '' });
        setIsNewConfirmOpen(false);
      };

      const handleSettingsClick = () => {
          if (mode === 'teacher') setIsTeacherSettingsModalOpen(true);
          else setSettingsModalOpen(true);
      };

      const fileInputRef = useRef(null);
      const handleFileChange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
              try {
                  const data = JSON.parse(event.target.result);
                  const newDraft = { ...data, id: data.id || crypto.randomUUID() };
                  updateStudentDb(newDraft);
                  setActiveDraft(newDraft);
                  setLoadModalOpen(false);
                  showToast('さくひんを よみこみました', 'success');
              } catch(err) {
                  showToast('ファイルの よみこみに しっぱい しました', 'error');
              }
          };
          reader.readAsText(file);
          e.target.value = ''; 
      };

      const [loadSearchQuery, setLoadSearchQuery] = useState('');
      const filteredLoadData = useMemo(() => {
          return studentDb.filter(d => {
              if (loadSearchQuery) {
                  const q = loadSearchQuery.toLowerCase();
                  if (!(d.title?.toLowerCase().includes(q) || d.name?.toLowerCase().includes(q) || d.content?.toLowerCase().includes(q))) return false;
              }
              return true;
          });
      }, [studentDb, loadSearchQuery]);

      const SyncBadge = () => {
          if (mode === 'teacher') return null;
          
          let icon = "bi-cloud-slash";
          let text = "オフライン";
          let colorClass = "text-slate-500 bg-slate-100 border-slate-200";

          if (syncStatus === 'connecting') {
              icon = "bi-arrow-repeat animate-spin"; text = <><Rb t="接続中" r="せつぞくちゅう"/>...</>; colorClass = "text-blue-600 bg-blue-50 border-blue-200";
          } else if (syncStatus === 'connected' || syncStatus === 'saved') {
              icon = "bi-cloud-check-fill"; text = <><Rb t="先生" r="せんせい"/>と<Rb t="同期済" r="どうきずみ"/></>; colorClass = "text-emerald-600 bg-emerald-50 border-emerald-200 shadow-sm";
          } else if (syncStatus === 'saving') {
              icon = "bi-cloud-arrow-up-fill animate-pulse"; text = <><Rb t="保存" r="ほぞん"/>・<Rb t="同期中" r="どうきちゅう"/>...</>; colorClass = "text-blue-600 bg-blue-50 border-blue-200";
          }

          return (
              <div className={`flex items-center gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold border transition-all duration-300 ${colorClass}`}>
                  <i className={`bi ${icon} text-xs sm:text-sm`}></i>
                  <span className="hidden sm:inline">{text}</span>
              </div>
          );
      };

      return (
        <div className="min-h-screen flex flex-col bg-slate-50 text-slate-800 font-sans selection:bg-blue-200 selection:text-blue-900">
          <style>{GLOBAL_STYLES}</style>
          <LoadingOverlay isVisible={loading.isVisible} text={loading.text} />
          <ToastMessage isVisible={toast.isVisible} message={toast.message} type={toast.type} onClose={() => setToast(prev => ({...prev, isVisible: false}))} />
          <MiniToast isVisible={miniToast.isVisible} message={miniToast.message} type={miniToast.type} onClose={() => setMiniToast(prev => ({...prev, isVisible: false}))} />
          <TeacherAuthModal isOpen={isTeacherAuthModalOpen} onClose={() => setTeacherAuthModalOpen(false)} onSubmit={handleTeacherAuth} />
          <TeacherSettingsModal isOpen={isTeacherSettingsModalOpen} onClose={() => setIsTeacherSettingsModalOpen(false)} db={db} setDb={setDb} showLoading={showLoading} hideLoading={hideLoading} showToast={showToast} />
          <ConnectModal isOpen={isConnectModalOpen} onClose={() => setIsConnectModalOpen(false)} onConnect={handleConnectWithPin} />

          <nav className="flex-shrink-0 z-40 w-full bg-white border-b border-slate-200 shadow-sm transition-colors duration-300 no-print" style={{ borderBottomColor: mode === 'teacher' ? '#f43f5e' : '#3b82f6', borderBottomWidth: '3px' }}>
            <div className="px-3 py-2 sm:px-6 sm:py-2.5 flex flex-wrap items-center justify-between w-full gap-y-2">
              <button onClick={() => handleSwitchMode('student')} className="flex items-center gap-2 sm:gap-3 hover:opacity-80 transition-all active:scale-95 group">
                <div className={`p-1.5 sm:p-2 rounded-xl text-white shadow-sm transition-colors ${mode === 'teacher' ? 'bg-rose-500 group-hover:bg-rose-600' : 'bg-blue-500 group-hover:bg-blue-600'}`}>
                  <i className="bi bi-pencil-square text-[20px] sm:text-[24px]"></i>
                </div>
                <div className="flex items-baseline gap-1 sm:gap-2">
                  <span className={`font-bold text-lg sm:text-xl tracking-wide pt-1 sm:pt-2 leading-loose transition-colors ${mode === 'teacher' ? 'text-rose-600 group-hover:text-rose-700' : 'text-blue-600 group-hover:text-blue-700'}`}>
                    <span className="hidden sm:inline">オンライン</span><Rb t="原稿用紙" r="げんこうようし"/>
                  </span>
                  <span className={`hidden sm:inline-block px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-bold text-white shadow-sm transition-colors ${mode === 'teacher' ? 'bg-rose-500' : 'bg-blue-500'}`}>Pro</span>
                </div>
              </button>

              <div className="flex items-center gap-2 sm:gap-3 ml-auto">
                  <SyncBadge />
                  {mode === 'student' && syncStatus === 'offline' && (
                      <button onClick={() => setIsConnectModalOpen(true)} className="flex items-center gap-1 sm:gap-1.5 text-white bg-blue-500 hover:bg-blue-600 hover:shadow-lg px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold shadow-md transition-all active:scale-95">
                          <i className="bi bi-link-45deg text-base sm:text-lg -mt-0.5"></i> <Rb t="先生" r="せんせい"/>と<Rb t="接続" r="せつぞく"/>
                      </button>
                  )}
                  {mode === 'student' && returnedDrafts.length > 0 && (
                      <button onClick={() => setNotificationModalOpen(true)} className="relative p-1.5 sm:p-2 pt-2 sm:pt-3 text-amber-500 hover:bg-slate-100 rounded-full transition-all active:scale-95" title="通知">
                          <i className="bi bi-bell-fill text-[18px] sm:text-[22px]"></i>
                          {unreadCount > 0 && (
                              <span className="absolute top-0.5 right-0 sm:top-1 sm:right-1 w-3 h-3 sm:w-4 sm:h-4 bg-rose-500 text-white text-[8px] sm:text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white shadow-sm">
                                  {unreadCount}
                              </span>
                          )}
                      </button>
                  )}
                  <button onClick={handleSettingsClick} className="p-1.5 sm:p-2 pt-2 sm:pt-3 text-slate-500 hover:bg-slate-100 rounded-full transition-all active:scale-95" title="設定">
                    <i className="bi bi-gear text-[18px] sm:text-[22px]"></i>
                  </button>
                  <button onClick={() => handleSwitchMode('teacher')} className={`px-3 sm:px-4 pt-2 sm:pt-3 pb-1.5 sm:pb-2 rounded-full text-xs sm:text-sm font-bold flex items-center gap-1 sm:gap-2 border transition-all active:scale-95 ${mode === 'teacher' ? 'bg-rose-50 border-rose-200 text-rose-700 shadow-sm' : 'border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-rose-200 hover:text-rose-600'}`}>
                    <i className="bi bi-person-gear text-[16px] sm:text-[18px] -mt-1"></i> <span className="hidden sm:inline"><Rb t="先生用" r="せんせいよう"/></span>
                  </button>
              </div>
            </div>
          </nav>

          <main className="flex-1 overflow-hidden flex flex-col no-print relative">
            {mode === 'student' && <StudentView draft={activeDraft} settings={settings} updateDraft={setActiveDraft} onSave={handleSaveDraft} onNew={handleNewDraft} setSyncStatus={setSyncStatus} setLoadModalOpen={setLoadModalOpen} showToast={showToast} showMiniToast={showMiniToast} showLoading={showLoading} hideLoading={hideLoading} sendToHost={sendToHost} studentDb={studentDb} />}
            {mode === 'teacher' && <TeacherView db={db} setDb={setDb} settings={settings} updateStatus={updateTeacherStatus} updateDraftInDB={updateDraftInDB} selectedId={teacherSelectedId} setSelectedId={setTeacherSelectedId} setGlobalPrintDrafts={setGlobalPrintDrafts} showLoading={showLoading} hideLoading={hideLoading} showToast={showToast} showMiniToast={showMiniToast} peerId={peerId} pinCode={pinCode} connections={connections} createRoom={createRoom} sendToClient={sendToClient} />}
          </main>

          <footer className="flex-shrink-0 w-full bg-white border-t border-slate-200 pt-2 pb-1.5 sm:pt-3 sm:pb-2 text-center text-xs sm:text-sm text-slate-500 font-bold no-print z-40 shadow-sm relative">
            ©2026 オンライン原稿用紙 Pro <a href="https://note.com/cute_borage86" target="_blank" rel="noopener noreferrer" className="text-inherit no-underline hover:opacity-80 transition-opacity">GIGA山</a>
          </footer>

          <div className="print-only">
             {globalPrintDrafts.map(d => (
                 <div key={d.id}>
                    <PrintGenkoView draft={d} settings={settings} />
                 </div>
             ))}
          </div>

          <Modal isOpen={isNewConfirmOpen} onClose={() => setIsNewConfirmOpen(false)} title={<><Rb t="新規作成" r="しんきさくせい"/>の<Rb t="確認" r="かくにん"/></>} maxWidth="max-w-md">
              <div className="space-y-4">
                  <p className="text-slate-700 font-bold leading-[2.5] pt-2">
                      <Rb t="現在" r="げんざい"/><Rb t="書" r="か"/>いている<Rb t="内容" r="ないよう"/>はクリアされます。<br/>
                      <span className="text-sm text-blue-500 leading-[2.5]">（<Rb t="保存" r="ほぞん"/>していない<Rb t="場合" r="ばあい"/>は<Rb t="消" r="き"/>えてしまいます）</span><br/><br/>
                      <Rb t="本当" r="ほんとう"/>に<Rb t="新" r="あたら"/>しく<Rb t="書" r="か"/>き<Rb t="始" r="はじ"/>めますか？
                  </p>
                  <div className="flex gap-3 pt-4 border-t border-slate-100">
                      <button onClick={() => setIsNewConfirmOpen(false)} className="flex-1 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 transition-all active:scale-95">キャンセル</button>
                      <button onClick={executeNewDraft} className="flex-1 py-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition-all active:scale-95 shadow-sm"><Rb t="新" r="あたら"/>しく<Rb t="書" r="か"/>く</button>
                  </div>
              </div>
          </Modal>

          <Modal isOpen={isLoadModalOpen} onClose={() => setLoadModalOpen(false)} title={<><Rb t="保存" r="ほぞん"/>した<Rb t="作品" r="さくひん"/>を<Rb t="開" r="ひら"/>く</>} maxWidth="max-w-xl">
                <div className="space-y-4 flex flex-col h-full max-h-[60vh]">
                  <div className="flex flex-col gap-2 bg-slate-50 p-3 rounded-xl border border-slate-200 shrink-0">
                    <div className="relative">
                        <i className="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="text" placeholder="キーワードで探す" value={loadSearchQuery} onChange={(e)=>setLoadSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all font-bold" />
                    </div>
                  </div>
                  
                  <div className="flex-1 space-y-2 overflow-y-auto pr-2 hide-scrollbar min-h-[200px]">
                      {filteredLoadData.length === 0 ? (
                          <div className="text-center text-slate-400 py-10 font-bold leading-loose"><Rb t="見" r="み"/>つかりませんでした</div>
                      ) : (
                          filteredLoadData.map(d => (
                            <div key={d.id} onClick={() => { setActiveDraft(d); setLoadModalOpen(false); }} className="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-xl hover:border-blue-300 hover:shadow-md cursor-pointer transition-all active:scale-[0.98] group">
                              <div className="min-w-0">
                                <div className="font-bold text-slate-800 text-lg group-hover:text-blue-600 transition-colors pt-2 truncate">{d.title || <Rb t="無題" r="むだい"/>}</div>
                                <div className="text-sm text-slate-500 mt-1 truncate">{d.class} {d.name}</div>
                              </div>
                              <div className="flex flex-col items-end gap-1 shrink-0 ml-4">
                                <span className={`px-3 pt-2 pb-1 rounded-full text-xs font-bold text-white shadow-sm ${d.status==='submitted'?'bg-blue-500':d.status==='completed'?'bg-emerald-500':d.status==='rework'?'bg-amber-500':'bg-slate-400'}`}>
                                  {d.status==='submitted'?<Rb t="提出済" r="ていしゅつずみ"/>:d.status==='completed'?<Rb t="完了" r="かんりょう"/>:d.status==='rework'?<Rb t="再提出" r="さいていしゅつ"/>:<><Rb t="下書" r="したが"/>き</>}
                                </span>
                                <span className="text-xs text-slate-400 font-bold">{d.updatedAt}</span>
                              </div>
                            </div>
                          ))
                      )}
                  </div>

                  <div className="pt-4 border-t border-slate-200 shrink-0">
                      <p className="text-xs text-slate-500 font-bold mb-3 mt-2 text-center leading-loose">または、<Rb t="先生" r="せんせい"/>からもらったファイルを<Rb t="開" r="ひら"/>く</p>
                      <input type="file" accept=".json" style={{display: 'none'}} ref={fileInputRef} onChange={handleFileChange} />
                      <button onClick={() => fileInputRef.current.click()} className="w-full py-3 bg-slate-100 text-slate-700 font-bold rounded-xl border border-slate-300 hover:bg-slate-200 transition-all active:scale-95 flex items-center justify-center gap-2 shadow-sm">
                          <i className="bi bi-file-earmark-arrow-up"></i> ファイルから<Rb t="読" r="よ"/>み<Rb t="込" r="こ"/>む
                      </button>
                  </div>
                </div>
          </Modal>

          <Modal isOpen={isNotificationModalOpen} onClose={() => setNotificationModalOpen(false)} title={<><i className="bi bi-bell-fill text-amber-500 mr-2"></i><Rb t="先生" r="せんせい"/>からの<Rb t="返却" r="へんきゃく"/></>} maxWidth="max-w-xl">
              {returnedDrafts.length === 0 ? <div className="text-center text-slate-400 py-10 pt-12 font-bold leading-loose">まだ<Rb t="返却" r="へんきゃく"/>されたものはありません</div> : (
                <div className="space-y-2 max-h-[50vh] overflow-y-auto pr-2 hide-scrollbar">
                  {returnedDrafts.map(d => {
                      const isUnread = readReceipts[d.id] !== d.updatedAt;
                      return (
                          <div key={d.id} className={`flex items-center justify-between p-4 rounded-xl border transition-all ${isUnread ? 'bg-amber-50 border-amber-200 shadow-sm' : 'bg-slate-50 border-slate-200'}`}>
                            <div className="min-w-0">
                              <div className="flex items-center gap-2">
                                  <span className={`text-xs font-bold px-2 py-0.5 rounded shadow-sm text-white ${d.status === 'completed' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                      {d.status === 'completed' ? <Rb t="完了" r="かんりょう"/> : <Rb t="再提出" r="さいていしゅつ"/>}
                                  </span>
                                  {isUnread && <span className="bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-sm animate-pulse shadow-sm">New</span>}
                              </div>
                              <div className="font-bold text-slate-800 text-lg pt-2 truncate mt-1">{d.title || <Rb t="無題" r="むだい"/>}</div>
                            </div>
                            <button onClick={() => {
                                const newReceipts = { ...readReceipts, [d.id]: d.updatedAt };
                                setReadReceipts(newReceipts);
                                localStorage.setItem(READ_RECEIPTS_KEY, JSON.stringify(newReceipts));
                                setActiveDraft(d);
                                setNotificationModalOpen(false);
                            }} className={`shrink-0 ml-4 px-4 py-2 rounded-lg font-bold transition-all active:scale-95 ${isUnread ? 'bg-amber-500 text-white shadow-sm hover:bg-amber-600 hover:shadow-md' : 'bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 shadow-sm'}`}>
                                <Rb t="確認" r="かくにん"/>する
                            </button>
                          </div>
                      );
                  })}
                </div>
              )}
          </Modal>

          <Modal isOpen={isSettingsModalOpen} onClose={() => setSettingsModalOpen(false)} title={<><Rb t="設定" r="せってい"/></>} maxWidth="max-w-md">
            <div className="space-y-6">
              <div>
                <h4 className="font-bold text-slate-700 mb-3 pt-3 leading-loose"><Rb t="用紙" r="ようし"/>の<Rb t="文字数" r="もじすう"/></h4>
                <div className="space-y-3">
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="chars" checked={settings.charsPerLine === 20} onChange={() => setSettings({...settings, charsPerLine: 20})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2 leading-[2.5]">20<Rb t="文字" r="もじ"/> × 20<Rb t="行" r="ぎょう"/> (<Rb t="高学年" r="こうがくねん"/>)</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="chars" checked={settings.charsPerLine === 15} onChange={() => setSettings({...settings, charsPerLine: 15})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2 leading-[2.5]">15<Rb t="文字" r="もじ"/> × 16<Rb t="行" r="ぎょう"/> (<Rb t="低学年" r="ていがくねん"/>)</span>
                  </label>
                </div>
              </div>
              <div>
                <h4 className="font-bold text-slate-700 mb-3 pt-3 leading-loose"><Rb t="禁則処理" r="きんそくしょり"/></h4>
                <div className="space-y-3">
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="kinsoku" checked={settings.kinsokuMode === 'oidashi'} onChange={() => setSettings({...settings, kinsokuMode: 'oidashi'})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2 leading-[2.5]"><Rb t="追" r="お"/>い<Rb t="出" r="だ"/>し（<Rb t="前行末" r="ぜんぎょうまつ"/>の<Rb t="文字" r="もじ"/>を<Rb t="次行" r="じぎょう"/>に<Rb t="送" r="おく"/>る）</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-blue-50/50 transition-colors active:scale-[0.98]">
                    <input type="radio" name="kinsoku" checked={settings.kinsokuMode === 'burasagari'} onChange={() => setSettings({...settings, kinsokuMode: 'burasagari'})} className="w-4 h-4 text-blue-500 focus:ring-blue-500" />
                    <span className="font-bold text-slate-700 pt-2 leading-[2.5]">ぶら<Rb t="下" r="さ"/>がり（マス<Rb t="外" r="そと"/>に<Rb t="小" r="ちい"/>さく<Rb t="表示" r="ひょうじ"/>）</span>
                  </label>
                </div>
              </div>
              <div className="flex justify-end pt-4 border-t border-slate-100 mt-2">
                <button onClick={() => setSettingsModalOpen(false)} className="px-6 pt-4 pb-3 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-700 hover:shadow-lg transition-all active:scale-95 shadow-md"><Rb t="保存" r="ほぞん"/>して<Rb t="閉" r="と"/>じる</button>
              </div>
            </div>
          </Modal>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
